    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap');

        body { margin: 0; background: #050905; color: #e8f4e8; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
        input, select {
            background: #0b1a0b;
            border: 1px solid #3a7a3a;

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { opacity: 1; }

        input:focus, select:focus { border-color: #6ac86a; background: #0e200e; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {

            input, select { font-size: 12px; padding: 6px 8px; }
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceArea, ReferenceLine } = window.Recharts;

        // ─── DATABASE — da Sabine.xlsx + catalogo esteso ─────────────────────────────
        // Fonte: foglio Sabine.xlsx (Foglio1, righe 8–17) + integrazioni
        // Bande: 63 Hz stimata/interpolata dove non presente nel foglio
        const MATERIALS = {
            // ── dal foglio Sabine.xlsx ──────────────────────────────────────────────
            "Apertura condotti di ventilazione":             {63:1.15,125:1.15,250:0.80,500:0.80,1000:0.80,2000:1.25,4000:1.25, src:"Sabine.xlsx"},
            "Apertura del proscenio":                        {63:0.25,125:0.30,250:0.35,500:0.40,1000:0.45,2000:0.50,4000:0.55, src:"Sabine.xlsx"},
            "Ghiaia spessore 150 mm":                        {63:0.10,125:0.15,250:0.30,500:0.80,1000:0.42,2000:1.01,4000:1.12, src:"Sabine.xlsx"},
            "Sabbia asciutta 150 mm":                        {63:0.15,125:0.24,250:0.34,500:0.45,1000:1.02,2000:1.16,4000:1.35, src:"Sabine.xlsx"},
            "Intonaco acustico 10 mm (a parete)":            {63:0.05,125:0.08,250:0.15,500:0.30,1000:0.50,2000:0.60,4000:0.70, src:"Sabine.xlsx"},
            "Intonaco / Marmo / Piastrelle":                 {63:0.01,125:0.01,250:0.01,500:0.02,1000:0.02,2000:0.02,4000:0.03, src:"Sabine.xlsx"},
            "Legno parquet su cls":                          {63:0.04,125:0.04,250:0.04,500:0.07,1000:0.06,2000:0.06,4000:0.07, src:"Sabine.xlsx"},
            "Piastrelle/linoleum/gomma su cls":              {63:0.02,125:0.02,250:0.03,500:0.03,1000:0.03,2000:0.03,4000:0.02, src:"Sabine.xlsx"},
            "Superfici compatte e dure":                     {63:0.02,125:0.02,250:0.02,500:0.03,1000:0.03,2000:0.04,4000:0.05, src:"Sabine.xlsx"},
            "Pannelli legno vibranti (intercapedine aria)":  {63:0.50,125:0.40,250:0.20,500:0.12,1000:0.07,2000:0.05,4000:0.05, src:"Sabine.xlsx"},
            // ── altri materiali comuni ──────────────────────────────────────────────
            "Calcestruzzo grezzo":          {63:0.02,125:0.02,250:0.03,500:0.03,1000:0.03,2000:0.04,4000:0.05},
            "Calcestruzzo verniciato":      {63:0.01,125:0.01,250:0.01,500:0.02,1000:0.02,2000:0.02,4000:0.03},
            "Mattone intonacato":           {63:0.01,125:0.01,250:0.02,500:0.02,1000:0.03,2000:0.04,4000:0.05},
            "Mattone a vista":              {63:0.02,125:0.03,250:0.03,500:0.04,1000:0.05,2000:0.07,4000:0.07},
            "Vetro singolo":                {63:0.35,125:0.25,250:0.18,500:0.12,1000:0.07,2000:0.04,4000:0.03},
            "Vetro doppio":                 {63:0.10,125:0.07,250:0.05,500:0.03,1000:0.02,2000:0.02,4000:0.02},
            "Legno pannello 10mm":          {63:0.30,125:0.25,250:0.20,500:0.17,1000:0.15,2000:0.10,4000:0.08},
            "Moquette spessa":              {63:0.02,125:0.05,250:0.14,500:0.37,1000:0.60,2000:0.65,4000:0.72},
            "Moquette sottile":             {63:0.01,125:0.02,250:0.05,500:0.15,1000:0.30,2000:0.40,4000:0.50},
            "Gesso / Cartongesso":          {63:0.14,125:0.10,250:0.06,500:0.05,1000:0.04,2000:0.03,4000:0.03},
            "Tende pesanti":                {63:0.05,125:0.07,250:0.13,500:0.30,1000:0.55,2000:0.70,4000:0.70},
            "Tende leggere":                {63:0.03,125:0.04,250:0.07,500:0.15,1000:0.35,2000:0.45,4000:0.50},
            "Soffitto forato mineral":      {63:0.30,125:0.45,250:0.60,500:0.75,1000:0.80,2000:0.80,4000:0.75},
        };

        // Pannelli acustici — da Sabine.xlsx (righe 19–22) + catalogo esteso
        // Fonte: foglio Sabine.xlsx — α misurati in situ, Q.tà in pezzi da 0,25 mq
        const PANELS = {
            // ── dal foglio Sabine.xlsx ──────────────────────────────────────────────
            "Poliuretano 0,25 mq/pz":           {63:0.29,125:0.29,250:0.35,500:0.42,1000:0.70,2000:0.92,4000:0.79, type:"absorber", src:"Sabine.xlsx"},
            "Legno microforato 0,25 mq/pz":     {63:0.40,125:0.40,250:0.45,500:0.75,1000:0.30,2000:0.20,4000:0.15, type:"absorber", src:"Sabine.xlsx"},
            "Tessuto 0,25 mq/pz":               {63:0.10,125:0.10,250:0.25,500:0.50,1000:0.82,2000:1.00,4000:0.90, type:"absorber", src:"Sabine.xlsx"},
            "Bass trap angolari (tessuto)":      {63:0.60,125:0.60,250:0.40,500:0.10,1000:0.10,2000:0.10,4000:0.10, type:"absorber", src:"Sabine.xlsx"},
            // ── catalogo esteso ─────────────────────────────────────────────────────
            "Lana di roccia 50mm":               {63:0.10,125:0.25,250:0.60,500:0.95,1000:1.00,2000:1.00,4000:1.00, type:"absorber"},
            "Lana di roccia 100mm":              {63:0.25,125:0.55,250:0.90,500:1.00,1000:1.00,2000:1.00,4000:1.00, type:"absorber"},
            "Schiuma acustica 50mm":             {63:0.05,125:0.10,250:0.25,500:0.60,1000:0.95,2000:1.00,4000:1.00, type:"absorber"},
            "Pannello microforato poliacrilato":  {63:0.05,125:0.15,250:0.45,500:0.80,1000:0.85,2000:0.80,4000:0.75, type:"absorber"},
            "Pannello riflettente MDF 18mm":     {63:0.25,125:0.15,250:0.10,500:0.08,1000:0.06,2000:0.05,4000:0.04, type:"reflector"},
            "Diffusore QRD Skyline":             {63:0.05,125:0.10,250:0.20,500:0.40,1000:0.60,2000:0.70,4000:0.75, type:"diffuser"},
            "Bass trap lana roccia 150mm":       {63:0.50,125:0.80,250:0.95,500:1.00,1000:1.00,2000:1.00,4000:1.00, type:"absorber"},
        };

        const BANDS    = [63, 125, 250, 500, 1000, 2000, 4000];
        // Bande presenti nel foglio Sabine (senza 63 Hz — usate per display αS misurato)
        const BANDS_S  = [125, 250, 500, 1000, 2000, 4000];
        const SURF_DEF = ["Pavimento","Soffitto","Parete Frontale","Parete Posteriore","Parete Sinistra","Parete Destra"];
        const C        = 344; // [m/s] a 20°C, 0m altitudine, 1 atm (dai PDF)
        const NOTE_NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

        // ─── MATH ────────────────────────────────────────────────────────────────────

        // f2 (fine reg. B) = 1875 · √(RT60_medio / V)   [da PDF Rayleigh]
        function f2regB(rtMedio, V) {
            return rtMedio > 0 && V > 0 ? 1875 * Math.sqrt(rtMedio / V) : 200;
        }

        // RT60 medio aritmetico sulle 6 bande test (Sabine)
        function rtMedio(rt) {
            const vals = BANDS_S.map(f => rt[f] || 0).filter(v => v > 0);
            return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
        }

        // Equazione di Rayleigh: fijk = (c/2)·√[(i/L)²+(j/W)²+(k/H)²]
        // Indici 0..8, f da 20 Hz a f2 dinamica
        function roomModes(L, W, H, f2) {
            const fMax = f2 || 300;
            const modes = [];
            for (let nx=0; nx<=8; nx++) for (let ny=0; ny<=8; ny++) for (let nz=0; nz<=8; nz++) {
                if (!nx && !ny && !nz) continue;
                const f = (C/2) * Math.sqrt((nx/L)**2 + (ny/W)**2 + (nz/H)**2);
                if (f < 20 || f > fMax) continue;
                const dims = [nx>0, ny>0, nz>0].filter(Boolean).length;
                const type = dims===1 ? "assiale" : dims===2 ? "tangenziale" : "obliquo";
                const axis = nx>0&&ny===0&&nz===0?"L" : ny>0&&nx===0&&nz===0?"W" : nz>0&&nx===0&&ny===0?"H" : "mix";
                modes.push({ nx, ny, nz, freq: Math.round(f*10)/10, type, axis });
            }
            return modes.sort((a,b) => a.freq - b.freq);
        }

        // Ampiezza modi in [□] secondo il modello dai PDF (tabella Everest adottata a lezione)
        // Assiali: 100/ordine  Tangenziali: 70/ordine (con algoritmo somma indici)  Obliqui: 50/ordine (decresc. ~8□/somma)
        function modeAmplitude(nx, ny, nz) {
            const order = Math.max(nx, ny, nz);
            const active = [nx, ny, nz].filter(v => v > 0);
            const dims = active.length;
            if (order === 0) return 0;

            if (dims === 1) {
                // ASSIALE: 100 / ordine
                return 100 / order;
            } else if (dims === 2) {
                // TANGENZIALE: base 70/ordine, poi regola somma indici
                // "a parità di ordine, ampiezza decresce con somma indici"
                const baseA = 70 / order;
                const sumIdx = nx + ny + nz; // somma totale
                const minSum = order * 2;     // somma minima per questo ordine (es. ordine 1→ sum=2)
                const extraSteps = sumIdx - minSum;
                // Ogni step extra di somma riduce ~7% dell'ampiezza base (approssimazione tabella)
                const reduction = extraSteps * 0.07 * baseA;
                return Math.max(baseA * 0.4, baseA - reduction);
            } else {
                // OBLIQUO: base 50/ordine, poi decremento ~8□ per ogni somma oltre il minimo
                const baseA = 50 / order;
                const sumIdx = nx + ny + nz;
                const minSum = order * 3; // minimo per ordine puro (es. 111→sum3, 222→sum6)
                const extraSteps = sumIdx - minSum;
                const dec = 8 / order;   // il decremento scala con l'ordine
                return Math.max(baseA * 0.3, baseA - extraSteps * dec);
            }
        }

        // Larghezza di banda attorno a ogni modo: Δf = 2.2 / RT60_medio
        function deltaf(rtMed) {
            return rtMed > 0 ? 2.2 / rtMed : 10;
        }

        function absorption(surfaces) {
            const sa = {};
            BANDS.forEach(f => { sa[f] = 0; });
            surfaces.forEach(s => {
                const m = MATERIALS[s.material]; if (!m) return;
                const a = parseFloat(s.area) || 0;
                BANDS.forEach(f => { sa[f] += m[f] * a; });
            });
            return sa;
        }

        function rt60calc(V, sa) {
            const r = {};
            BANDS.forEach(f => { r[f] = sa[f] > 0 ? Math.round(0.161*V/sa[f]*100)/100 : 0; });
            return r;
        }

        // Formula di Eyring: RT = 0.161·V / (-S·ln(1-ᾱ))
        // ᾱ = αS_tot / S_tot   (coefficiente medio pesato per area)
        function rt60eyring(V, sa, Stot) {
            const r = {};
            BANDS.forEach(f => {
                const aSab = sa[f] || 0;
                const aBar = Stot > 0 ? Math.min(aSab / Stot, 0.9999) : 0;
                const denom = -Stot * Math.log(1 - aBar);
                r[f] = denom > 0 ? Math.round(0.161 * V / denom * 100) / 100 : 0;
            });
            return r;
        }

        // αS ricavato da misurazioni fonometriche: αS = 0.161·V / RT_misurato
        // measurements = { 125:[v1,v2,...], 250:[...], ... }
        function rt60fromMeasurements(measurements) {
            const rt = {};
            BANDS_S.forEach(f => {
                const vals = (measurements[f] || []).filter(v => v > 0);
                if (vals.length) rt[f] = Math.round(vals.reduce((a,b) => a+b, 0) / vals.length * 1000) / 1000;
            });
            return rt; // RT medio misurato per banda
        }
        function saFromRT(V, rt) {
            const sa = {};
            BANDS_S.forEach(f => { sa[f] = rt[f] > 0 ? Math.round(0.161 * V / rt[f] * 1000) / 1000 : 0; });
            return sa;
        }

        // Superficie totale della stanza data L,W,H
        function roomSurface(L, W, H) { return 2*(L*W + L*H + W*H); }

        function rt60ideal(V, wet) {
            const base = 0.25 * Math.cbrt(V), fac = 0.7 + wet * 2;
            const r = {};
            BANDS.forEach(f => {
                const lb = f<=125 ? 1.2 : f<=250 ? 1.1 : 1;
                r[f] = Math.round(base * fac * lb * 100) / 100;
            });
            return r;
        }

        function interpRT(rt, freq) {
            if (freq <= BANDS[0]) return rt[BANDS[0]] || 0.5;
            if (freq >= BANDS[BANDS.length-1]) return rt[BANDS[BANDS.length-1]] || 0.3;
            for (let i=0; i<BANDS.length-1; i++) {
                if (freq >= BANDS[i] && freq <= BANDS[i+1]) {
                    const t = (freq - BANDS[i]) / (BANDS[i+1] - BANDS[i]);
                    return (rt[BANDS[i]]||0.5)*(1-t) + (rt[BANDS[i+1]]||0.3)*t;
                }
            }
            return 0.5;
        }

        function roomResponse(L, W, H, rt) {
            const modes = roomModes(L, W, H, 500); // usa range esteso per la risposta
            const sX = W/2, sY = L*0.38, sZ = H*0.45;
            const freqs = [];
            for (let i=0; i<=120; i++) freqs.push(Math.round(20 * Math.pow(200, i/120) * 10) / 10);
            const raw = freqs.map(f => {
                let re=0, im=0;
                modes.forEach(m => {
                    const fn = m.freq;
                    const rtv = interpRT(rt, fn);
                    const eta = rtv > 0 ? 6.91 / (Math.PI * fn * rtv) : 0.05;
                    const px = m.nx > 0 ? Math.cos(Math.PI * m.nx * sX / W) : 1;
                    const py = m.ny > 0 ? Math.cos(Math.PI * m.ny * sY / L) : 1;
                    const pz = m.nz > 0 ? Math.cos(Math.PI * m.nz * sZ / H) : 1;
                    const sp = px * py * pz;
                    const amp = m.type==="assiale" ? 1 : m.type==="tangenziale" ? 0.45 : 0.2;
                    const r2 = f / fn;
                    const D = (1 - r2*r2)**2 + (eta*r2)**2;
                    re += amp * sp * (1 - r2*r2) / D;
                    im += amp * sp * (-eta*r2) / D;
                });
                const mag = Math.sqrt(re*re + im*im);
                return { freq: f, dB: mag > 1e-12 ? 20*Math.log10(mag) : -60 };
            });
            const valid = raw.filter(d => isFinite(d.dB) && d.dB > -59);
            if (!valid.length) return raw.map(d => ({...d, dB:0}));
            const mean = valid.reduce((s,d) => s+d.dB, 0) / valid.length;
            return raw.map(d => ({...d, dB: Math.round((d.dB - mean)*10)/10}));
        }

        function schroeder(V, rt500) {
            return Math.round(2000 * Math.sqrt((rt500||0.5) / V));
        }

        function freqToNote(freq) {
            const st = Math.round(12 * Math.log2(freq/440)) + 57;
            return { note: NOTE_NAMES[((st%12)+12)%12], oct: Math.floor(st/12), st };
        }
        function noteLabel(freq) { const {note, oct} = freqToNote(freq); return `${note}${oct}`; }

        // ─── PIANO ───────────────────────────────────────────────────────────────────
        // Il piano è posizionato su scala LOG da 20 a 4000 Hz, allineato al grafico EQ.
        // Ogni tasto occupa la sua posizione reale in % sul range log.

        function Piano({ eqData }) {
            const F_MIN = 20, F_MAX = 4000;
            const logMin = Math.log10(F_MIN), logMax = Math.log10(F_MAX);
            const logRange = logMax - logMin;

            function freqToX(f) {
                return ((Math.log10(Math.max(f, F_MIN)) - logMin) / logRange) * 100;
            }

            const BLACKS = new Set([1,3,6,8,10]);
            // Tasti da C0 a B8 — filtrati nel range 20–4000 Hz
            const s0 = Math.ceil(12*Math.log2(F_MIN/440)+57);
            const s1 = Math.floor(12*Math.log2(F_MAX/440)+57);
            const keys = [];
            for (let st=s0; st<=s1; st++) {
                const freq = 440 * Math.pow(2, (st-57)/12);
                if (freq < F_MIN || freq > F_MAX) continue;
                const pos = ((st%12)+12)%12;
                const isBlack = BLACKS.has(pos);
                const {note, oct} = freqToNote(freq);
                keys.push({ st, freq, isBlack, note, oct });
            }
            const whites = keys.filter(k => !k.isBlack);

            function lookup(freq) {
                if (!eqData || !eqData.length) return 0;
                let best = eqData[0], bd = Infinity;
                for (const d of eqData) { const dd = Math.abs(d.freq - freq); if (dd < bd) { bd = dd; best = d; } }
                return best.dB || 0;
            }
            function dBColor(db) {
                const c = Math.max(-15, Math.min(15, db));
                if (c >= 0) { const t = c/15; return `rgba(255,${Math.round(120-t*80)},${Math.round(60-t*50)},${0.5+t*0.5})`; }
                const t = -c/15; return `rgba(${Math.round(20+t*20)},${Math.round(130+t*80)},${Math.round(90+t*130)},${0.45+t*0.45})`;
            }

            // Larghezza di ogni tasto bianco: differenza in % tra freq del tasto e del successivo bianco
            return (
                <div style={{ marginTop:10 }}>
                    <div style={{ position:"relative", height:44, width:"100%", overflow:"hidden", background:"#050905" }}>
                        {/* Tasti bianchi: larghezza = distanza log fino al prossimo tasto bianco */}
                        {whites.map((k, i) => {
                            const xLeft = freqToX(k.freq);
                            const nextW = whites[i+1];
                            // larghezza fino al prossimo tasto bianco (o al bordo destra)
                            const xRight = nextW ? freqToX(nextW.freq) : 100;
                            const w = Math.max(xRight - xLeft, 0.3);
                            const db = lookup(k.freq);
                            return (
                                <div key={k.st} style={{
                                    position:"absolute", left:`${xLeft}%`, width:`${w}%`, height:"100%",
                                    background: dBColor(db),
                                    borderRight:"1px solid #0a140a",
                                    display:"flex", alignItems:"flex-end", justifyContent:"center", paddingBottom:2,
                                    overflow:"hidden",
                                }}>
                                    {k.note==="C" && (
                                        <span style={{ fontSize:8, color:"#2a5a2a", fontFamily:"monospace", lineHeight:1 }}>
                                            {k.note}{k.oct}
                                        </span>
                                    )}
                                </div>
                            );
                        })}
                        {/* Tasti neri sovrapposti */}
                        {keys.filter(k=>k.isBlack).map(k => {
                            const x = freqToX(k.freq);
                            const db = lookup(k.freq);
                            // larghezza: ~ metà della distanza fra due semiton
                            const freqPrev = 440 * Math.pow(2, (k.st-1-57)/12);
                            const freqNext = 440 * Math.pow(2, (k.st+1-57)/12);
                            const w = Math.max(freqToX(freqNext) - freqToX(freqPrev), 0.3) * 0.55;
                            return (
                                <div key={k.st} style={{
                                    position:"absolute",
                                    left:`${x - w/2}%`,
                                    width:`${w}%`, height:"58%",
                                    background: dBColor(db),
                                    border:"1px solid #020602",
                                    zIndex:2,
                                }} />
                            );
                        })}
                    </div>
                    <div style={{ fontSize:12, color:"#4a7a4a", marginTop:5, display:"flex", gap:14 }}>
                        <span><span style={{ color:"#ff7040" }}>■</span> picco</span>
                        <span><span style={{ color:"#40c8cc" }}>■</span> buca</span>
                        <span style={{ color:"#2a5a2a", marginLeft:"auto", fontSize:11 }}>scala logaritmica 20–4000 Hz</span>
                    </div>
                </div>
            );
        }

        // ─── HELPERS ─────────────────────────────────────────────────────────────────

        function Sec({ title, children }) {
            return (
                <div style={{ display:"flex", flexDirection:"column", gap:12, marginBottom:24 }}>
                    <div style={{ fontSize:13, letterSpacing:5, color:"#5aaa5a", textTransform:"uppercase",
                        borderBottom:"1px solid #1a3a1a", paddingBottom:8, fontWeight:700 }}>{title}</div>
                    {children}
                </div>
            );
        }
        function LL({ color, label, dashed }) {
            return (
                <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                    <div style={{ width:24, height:2, background:dashed?"none":color, borderTop:dashed?`2px dashed ${color}`:"none" }} />
                    <span style={{ fontSize:15, color:"#7aaa7a" }}>{label}</span>
                </div>
            );
        }
        function Empty() {
            return (
                <div style={{ color:"#3a6a3a", textAlign:"center", padding:60, fontSize:17, letterSpacing:2 }}>
                    Inserisci le dimensioni nella tab MISURAZIONI
                </div>
            );
        }

        // Btn eliminazione — rosso scuro
        function DelBtn({ onClick }) {
            return (
                <button onClick={onClick} style={{
                    background:"#2a0a0a", border:"1px solid #6a2020", color:"#cc5050",
                    borderRadius:4, padding:"0 8px", height:34, fontSize:14, cursor:"pointer",
                    fontFamily:"inherit", flexShrink:0, lineHeight:1,
                }}>✕</button>
            );
        }

        function useIsMobile() {
            const [mob, setMob] = React.useState(window.innerWidth <= 520);
            React.useEffect(() => {
                const h = () => setMob(window.innerWidth <= 520);
                window.addEventListener("resize", h);
                return () => window.removeEventListener("resize", h);
            }, []);
            return mob;
        }

        const inp = {
            background:"#0b1a0b", border:"1px solid #3a7a3a", borderRadius:4, color:"#c8eec8",
            padding:"7px 9px", fontSize:13, fontFamily:"'IBM Plex Mono','Courier New',monospace",
            width:"100%", outline:"none",
        };
        const sel = { ...inp, fontSize:12 };

        // ─── SPECTRAL PANEL SIZING ───────────────────────────────────────────────────
        // Per ogni pannello: calcola quanti m² coprono il deficit su TUTTE le bande.
        // Strategia: il pannello deve eliminare il deficit nella banda più critica
        // rispetto alla sua curva α. Usiamo il massimo di (deficit_f / α_f) su tutte le bande.
        // Ritorna { m2, bottleneck, coveragePct } dove coveragePct[f] indica quanto il
        // pannello (dimensionato su bottleneck) copre il deficit alla banda f (0–100%).
        function panelSizing(props, neededSA) {
            let worst = 0, bottleneck = 500;
            BANDS.forEach(f => {
                const deficit = neededSA[f] || 0;
                if (deficit <= 0) return;
                const alpha = props[f] || 0.001;
                const req = deficit / alpha;
                if (req > worst) { worst = req; bottleneck = f; }
            });
            const m2 = Math.ceil(worst);
            // quanto copre il pannello (m2) banda per banda rispetto al deficit
            const coveragePct = {};
            BANDS.forEach(f => {
                const deficit = neededSA[f] || 0;
                if (deficit <= 0) { coveragePct[f] = 100; return; }
                coveragePct[f] = Math.min(100, Math.round(m2 * (props[f]||0) / deficit * 100));
            });
            return { m2, bottleneck, coveragePct };
        }

        // Simula RT60 dopo aver aggiunto m2 m² di un pannello
        function rtAfterPanel(V, sa, props, m2) {
            const newSA = {};
            BANDS.forEach(f => { newSA[f] = (sa[f] || 0) + m2 * (props[f] || 0); });
            return rt60calc(V, newSA);
        }

        // ─── MINI SPARKBAR ───────────────────────────────────────────────────────────
        // Mostra: barra grigia = deficit SA assoluto per banda
        //         barra colorata = contributo SA del pannello (m2 × α[f])
        //         Le barre sono diverse per ogni pannello perché ogni α[f] è diverso
        function SparkBars({ props, neededSA, m2 }) {
            const maxVal = Math.max(
                ...BANDS.map(f => Math.max(neededSA[f]||0, m2*(props[f]||0))),
                0.01
            );
            return (
                <div style={{ display:"flex", gap:3, alignItems:"flex-end", height:52, marginTop:8 }}>
                    {BANDS.map(f => {
                        const deficit   = neededSA[f] || 0;
                        const provided  = m2 * (props[f] || 0);
                        const defH  = Math.round((deficit  / maxVal) * 44);
                        const provH = Math.round((provided / maxVal) * 44);
                        const ok    = provided >= deficit * 0.99;
                        const over  = provided > deficit * 1.05;
                        return (
                            <div key={f} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
                                <div style={{ width:"100%", position:"relative", height:44 }}>
                                    {/* deficit bar — grigio scuro */}
                                    {deficit > 0 && <div style={{ position:"absolute", bottom:0, width:"100%", height:defH,
                                        background:"#1e3e1e", borderRadius:"2px 2px 0 0" }} />}
                                    {/* SA fornito dal pannello — colorato */}
                                    <div style={{ position:"absolute", bottom:0, width:"100%", height:provH,
                                        background: over?"#5a9acc": ok?"#5aaa5a":"#aaaa40",
                                        borderRadius:"2px 2px 0 0", opacity:0.85 }} />
                                </div>
                                <span style={{ fontSize:9, color:"#3a6a3a" }}>
                                    {f>=1000 ? (f/1000)+"k" : f}
                                </span>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ─── PANEL CARD ──────────────────────────────────────────────────────────────
        function PanelCard({ name, props, neededSA, sa, rtI, V, isSelected, onClick }) {
            const { m2, bottleneck, coveragePct } = panelSizing(props, neededSA);
            const anyDeficit = BANDS.some(f => (neededSA[f]||0) > 0);
            if (!anyDeficit || m2 <= 0) return null;
            const tc = props.type==="absorber"?"#6aaa6a":props.type==="reflector"?"#aaaa6a":"#6a9acc";
            const rtPost = rtAfterPanel(V, sa, props, m2);
            // banda più critica dopo il trattamento
            const worstResidual = BANDS.reduce((acc, f) => {
                const r = rtPost[f]||0, i = rtI[f]||0;
                return (r - i > acc.d) ? { f, d: r-i } : acc;
            }, { f:500, d:-Infinity });

            return (
                <div onClick={onClick} style={{
                    background: isSelected ? "#0e220e" : "#090f09",
                    border:`1px solid ${isSelected ? tc : "#1e3e1e"}`,
                    borderLeft:`4px solid ${tc}`,
                    borderRadius:6, padding:"12px 14px", marginBottom:8, cursor:"pointer",
                    transition:"background 0.15s",
                }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                        <div style={{ flex:1 }}>
                            <div style={{ fontSize:15, color:"#c8eec8", fontWeight:600 }}>{name}</div>
                            <div style={{ fontSize:12, color:tc, letterSpacing:1, textTransform:"uppercase", marginTop:2 }}>
                                {props.type}
                                {bottleneck && <span style={{ color:"#4a7a4a", textTransform:"none", letterSpacing:0, marginLeft:8 }}>
                                    · collo di bottiglia: {bottleneck}Hz
                                </span>}
                            </div>
                        </div>
                        <div style={{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
                            <div style={{ fontSize:24, fontWeight:700, color: tc }}>{m2} m²</div>
                            <div style={{ fontSize:11, color:"#3a6a3a" }}>necessari</div>
                        </div>
                    </div>

                    {/* Sparkbars: copertura per banda */}
                    <SparkBars props={props} neededSA={neededSA} m2={m2} />

                    {/* Legenda mini */}
                    <div style={{ display:"flex", gap:14, fontSize:11, color:"#3a6a3a", marginTop:4 }}>
                        <span><span style={{ color:"#1e3e1e", fontSize:14 }}>█</span> deficit SA</span>
                        <span><span style={{ color:"#5aaa5a", fontSize:14 }}>█</span> coperto &nbsp;</span>
                        <span><span style={{ color:"#aaaa40", fontSize:14 }}>█</span> parz. &nbsp;</span>
                        <span><span style={{ color:"#aa4a20", fontSize:14 }}>█</span> insufficiente</span>
                    </div>

                    {/* RT60 post-trattamento quando selezionato */}
                    {isSelected && (
                        <div style={{ marginTop:14, borderTop:"1px solid #1a3a1a", paddingTop:12 }}>
                            <div style={{ fontSize:12, letterSpacing:3, color:"#4a8a4a", textTransform:"uppercase", marginBottom:8 }}>
                                RT60 simulato dopo {m2} m² di {name}
                            </div>
                            <div style={{ height:170 }}>
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart
                                        data={BANDS.map(f => ({ f:`${f}Hz`, Attuale:rtAfterPanel(V,sa,props,0)[f]||0, Simulato:rtPost[f]||0, Ideale:rtI[f]||0 }))}
                                        margin={{ top:4, right:8, bottom:4, left:0 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#0f1e0f" />
                                        <XAxis dataKey="f" tick={{ fill:"#4a8a4a", fontSize:12 }} />
                                        <YAxis tick={{ fill:"#4a8a4a", fontSize:12 }} unit="s" domain={[0,"auto"]} />
                                        <Tooltip contentStyle={{ background:"#0b1a0b", border:"1px solid #2a5a2a", fontSize:13, color:"#c8eec8" }} />
                                        <Line type="monotone" dataKey="Attuale"  stroke="#3a5a3a" strokeWidth={2} dot={{ r:3 }} strokeDasharray="4 3" />
                                        <Line type="monotone" dataKey="Simulato" stroke={tc}      strokeWidth={2.5} dot={{ r:4 }} />
                                        <Line type="monotone" dataKey="Ideale"   stroke="#e8b040" strokeWidth={2} dot={{ r:3 }} strokeDasharray="6 3" />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                            <div style={{ display:"flex", gap:16, marginTop:6, flexWrap:"wrap" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                    <div style={{ width:20, height:2, borderTop:"2px dashed #3a5a3a" }} />
                                    <span style={{ fontSize:12, color:"#5a8a5a" }}>Attuale</span>
                                </div>
                                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                    <div style={{ width:20, height:2, background:tc }} />
                                    <span style={{ fontSize:12, color:"#5a8a5a" }}>Simulato (+{m2}m²)</span>
                                </div>
                                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                    <div style={{ width:20, height:2, borderTop:"2px dashed #e8b040" }} />
                                    <span style={{ fontSize:12, color:"#5a8a5a" }}>Ideale</span>
                                </div>
                            </div>
                            {worstResidual.d > 0.05 && (
                                <div style={{ fontSize:12, color:"#aa8a30", marginTop:8, background:"#1a1500", border:"1px solid #3a3000", borderRadius:4, padding:"6px 10px" }}>
                                    ⚠ Ancora in eccesso a {worstResidual.f}Hz (+{worstResidual.d.toFixed(2)}s)
                                    — considerare trattamento combinato o superficie maggiore.
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // ─── TREATMENT SECTION ───────────────────────────────────────────────────────
        // Previsionale combinato: assorbitori LF + assorbitori MF + diffusori HF lavorano insieme
        function TreatmentSection({ neededSA, sa, rtI, V, Fs }) {
            const [selected, setSelected] = useState(null);
            const { useState: useS, useMemo: useM } = React;

            const totalDeficit = BANDS.reduce((s, f) => s + (neededSA[f]||0), 0);
            const maxDeficitBand = BANDS.reduce((best, f) => (neededSA[f]||0) > (neededSA[best]||0) ? f : best, BANDS[0]);

            // ── Previsionale combinato (ispirato alle guide di correzione acustica) ──
            // Tre strati che lavorano insieme in parallelo:
            // 1. Bass traps (angolari) → LF ≤250 Hz (modi assiali, angoli)
            // 2. Pannelli assorbenti a banda media → 250–2000 Hz
            // 3. Diffusori (QRD) → HF >1000 Hz (reg. D, live end)
            const combined = React.useMemo(() => {
                // Trova il miglior pannello per LF (max α a 63 e 125 Hz)
                const lfEntries = Object.entries(PANELS).filter(([,p]) => p.type==="absorber");
                const lfBest = lfEntries.reduce((best,[n,p]) =>
                    (p[63]+p[125]) > (best.p[63]+best.p[125]) ? {n,p} : best,
                    {n:lfEntries[0]?.[0], p:lfEntries[0]?.[1]||{}}
                );
                // Trova miglior pannello per MF (max α a 500 e 1000 Hz)
                const mfBest = lfEntries.reduce((best,[n,p]) =>
                    (p[500]+p[1000]) > (best.p[500]+best.p[1000]) ? {n,p} : best,
                    {n:lfEntries[0]?.[0], p:lfEntries[0]?.[1]||{}}
                );
                // Diffusore
                const diffEntries = Object.entries(PANELS).filter(([,p]) => p.type==="diffuser");
                const diffBest = diffEntries[0] ? {n:diffEntries[0][0], p:diffEntries[0][1]} : null;

                // Dimensiona LF: banda critica ≤250 Hz
                const lfBands = BANDS.filter(f => f<=250);
                let lfWorst = 0;
                lfBands.forEach(f => {
                    const def = neededSA[f]||0; if(def<=0) return;
                    const req = def / Math.max(lfBest.p[f]||0.001, 0.001);
                    if(req>lfWorst) lfWorst=req;
                });
                const lfM2 = Math.ceil(lfWorst);

                // Calcola SA residuo dopo LF
                const saAfterLF = {};
                BANDS.forEach(f => { saAfterLF[f] = (sa[f]||0) + lfM2*(lfBest.p[f]||0); });
                const rtAfterLF = rt60calc(V, saAfterLF);
                const neededAfterLF = {};
                BANDS.forEach(f => {
                    const c = rtAfterLF[f]>0 ? 0.161*V/rtAfterLF[f] : 0;
                    const id = rtI[f]>0 ? 0.161*V/rtI[f] : 0;
                    neededAfterLF[f] = Math.max(0, Math.round((id-c)*10)/10);
                });

                // Dimensiona MF: bande 250–2000 Hz sul SA residuo post-LF
                const mfBands = BANDS.filter(f => f>=250 && f<=2000);
                let mfWorst = 0;
                mfBands.forEach(f => {
                    const def = neededAfterLF[f]||0; if(def<=0) return;
                    const req = def / Math.max(mfBest.p[f]||0.001, 0.001);
                    if(req>mfWorst) mfWorst=req;
                });
                const mfM2 = Math.ceil(mfWorst);

                // SA totale combinato LF+MF
                const saFinal = {};
                BANDS.forEach(f => {
                    saFinal[f] = (sa[f]||0) + lfM2*(lfBest.p[f]||0) + mfM2*(mfBest.p[f]||0);
                });
                const rtFinal = rt60calc(V, saFinal);

                // Diffusore: dimensionato sulla parete posteriore (live end) = area della parete più grande
                // Regola pratica: coprire almeno la larghezza della parete posteriore × altezza udibile
                const diffM2 = diffBest ? Math.ceil(V**(1/3) * 1.5) : 0;

                return { lfBest, mfBest, diffBest, lfM2, mfM2, diffM2, rtFinal, saFinal };
            }, [neededSA, sa, rtI, V]);

            const rtCombinedChart = BANDS.map(f => ({
                f:`${f}Hz`,
                Attuale: rt60calc(V,sa)[f]||0,
                Combinato: combined.rtFinal[f]||0,
                Ideale: rtI[f]||0,
            }));

            return (
                <Sec title="TRATTAMENTO IDEALE CONSIGLIATO">
                    {/* Deficit per banda */}
                    <div style={{ background:"#080e08", border:"1px solid #1a3a1a", borderRadius:6, padding:"12px 16px", marginBottom:12 }}>
                        <div style={{ fontSize:12, letterSpacing:3, color:"#4a8a4a", textTransform:"uppercase", marginBottom:10 }}>Deficit SA per banda (m²Sab)</div>
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:5 }}>
                            {BANDS.map(f => {
                                const d = neededSA[f]||0;
                                const isMax = f===maxDeficitBand && d>0;
                                return (
                                    <div key={f} style={{ textAlign:"center", background:isMax?"#1a2a0a":"#0a140a",
                                        border:`1px solid ${isMax?"#4a7a2a":"#152515"}`, borderRadius:4, padding:"6px 2px" }}>
                                        <div style={{ fontSize:11, color:"#4a7a4a" }}>{f>=1000?(f/1000)+"k":f}Hz</div>
                                        <div style={{ fontSize:15, fontWeight:700, color:d>0?"#cc8830":"#3a7a3a", marginTop:2 }}>
                                            {d>0 ? d.toFixed(1) : "✓"}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        {totalDeficit > 0 && (
                            <div style={{ fontSize:13, color:"#5a8a4a", marginTop:8 }}>
                                Banda critica: <strong style={{color:"#cc9930"}}>{maxDeficitBand} Hz</strong>
                                &nbsp;·&nbsp; Deficit totale: <strong style={{color:"#c8eec8"}}>{totalDeficit.toFixed(1)} m²Sab</strong>
                            </div>
                        )}
                        {totalDeficit <= 0 && <div style={{fontSize:13,color:"#5aaa5a",marginTop:8}}>✓ Nessun deficit — RT60 già entro target</div>}
                    </div>

                    {/* ── PREVISIONALE COMBINATO ── */}
                    {totalDeficit > 0 && (
                        <div style={{ background:"#080e08", border:"2px solid #3a6a3a", borderRadius:8, padding:"16px", marginBottom:16 }}>
                            <div style={{ fontSize:13, letterSpacing:3, color:"#7ac87a", textTransform:"uppercase", marginBottom:14, fontWeight:700 }}>
                                ⚡ Previsionale combinato
                            </div>
                            <div style={{ fontSize:12, color:"#4a7a4a", marginBottom:14, lineHeight:1.7 }}>
                                I tre strati lavorano <strong style={{color:"#8ae08a"}}>in parallelo</strong> — dimensionati progressivamente sul SA residuo.
                            </div>

                            {/* Tre strati */}
                            {[
                                {
                                    step:1, label:"Bass trap angolari", range:"LF — 63–250 Hz",
                                    color:"#e8b040", role:"Ridistribuisce energia dai ventri ai nodi. Posizionamento: angoli dietro le casse (Dead End).",
                                    name: combined.lfBest.n, props: combined.lfBest.p, m2: combined.lfM2,
                                },
                                {
                                    step:2, label:"Pannelli assorbenti (MF)", range:"MF — 250–2000 Hz",
                                    color:"#7ac87a", role:"Intervento sul SA residuo dopo LF. Parete Dead End e punti di prime riflessioni.",
                                    name: combined.mfBest.n, props: combined.mfBest.p, m2: combined.mfM2,
                                },
                                ...(combined.diffBest ? [{
                                    step:3, label:"Diffusori Schroeder (QRD)", range:"HF — >1000 Hz",
                                    color:"#6a9acc", role:"Sparpaglia le riflessioni sulla Live End (parete di fondo). Alternare orizzontale/verticale.",
                                    name: combined.diffBest.n, props: combined.diffBest.p, m2: combined.diffM2,
                                }] : []),
                            ].map(({step,label,range,color,role,name,props,m2}) => (
                                <div key={step} style={{ background:"#0a140a", border:`1px solid ${color}44`,
                                    borderLeft:`4px solid ${color}`, borderRadius:6, padding:"12px 14px", marginBottom:10 }}>
                                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                                        <div style={{ flex:1 }}>
                                            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                                                <div style={{ width:20, height:20, borderRadius:"50%", background:color,
                                                    display:"flex", alignItems:"center", justifyContent:"center",
                                                    fontSize:11, fontWeight:700, color:"#050905", flexShrink:0 }}>{step}</div>
                                                <span style={{ fontSize:15, color:"#c8eec8", fontWeight:700 }}>{label}</span>
                                                <span style={{ fontSize:12, color:color, marginLeft:4 }}>{range}</span>
                                            </div>
                                            <div style={{ fontSize:13, color:"#5a8a5a", lineHeight:1.6 }}>{role}</div>
                                            {name && <div style={{ fontSize:12, color:"#3a7a3a", marginTop:4 }}>Prodotto: {name}</div>}
                                        </div>
                                        <div style={{ textAlign:"right", flexShrink:0, marginLeft:12 }}>
                                            <div style={{ fontSize:26, fontWeight:700, color }}>{m2 > 0 ? m2 : "—"}</div>
                                            <div style={{ fontSize:12, color:"#3a6a3a" }}>m²</div>
                                        </div>
                                    </div>
                                    {/* SparkBar del contributo di questo pannello */}
                                    {m2 > 0 && props && <SparkBars props={props} neededSA={neededSA} m2={m2} />}
                                    <div style={{ display:"flex", gap:14, fontSize:11, color:"#3a6a3a", marginTop:4 }}>
                                        <span><span style={{color:"#1e3e1e",fontSize:12}}>█</span> deficit SA</span>
                                        <span><span style={{color:"#5aaa5a",fontSize:12}}>█</span> coperto</span>
                                        <span><span style={{color:"#aaaa40",fontSize:12}}>█</span> parziale</span>
                                        <span><span style={{color:"#5a9acc",fontSize:12}}>█</span> eccesso</span>
                                    </div>
                                </div>
                            ))}

                            {/* Grafico RT60 combinato */}
                            <div style={{ marginTop:14 }}>
                                <div style={{ fontSize:12, letterSpacing:2, color:"#4a8a4a", textTransform:"uppercase", marginBottom:8 }}>
                                    RT60 simulato — trattamento combinato completo
                                </div>
                                <div style={{ height:180 }}>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={rtCombinedChart} margin={{top:4,right:8,bottom:4,left:0}}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#0f1e0f" />
                                            <XAxis dataKey="f" tick={{fill:"#4a8a4a",fontSize:12}} />
                                            <YAxis tick={{fill:"#4a8a4a",fontSize:12}} unit="s" domain={[0,"auto"]} />
                                            <Tooltip contentStyle={{background:"#0b1a0b",border:"1px solid #2a5a2a",fontSize:13,color:"#c8eec8"}} />
                                            <Line type="monotone" dataKey="Attuale"   stroke="#3a5a3a" strokeWidth={2} dot={{r:3}} strokeDasharray="4 3" />
                                            <Line type="monotone" dataKey="Combinato" stroke="#7ac87a" strokeWidth={2.5} dot={{r:4,fill:"#7ac87a"}} />
                                            <Line type="monotone" dataKey="Ideale"    stroke="#e8b040" strokeWidth={2} dot={{r:3}} strokeDasharray="6 3" />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                                <div style={{ display:"flex", gap:16, marginTop:6, flexWrap:"wrap" }}>
                                    {[{col:"#3a5a3a",lbl:"Attuale",dash:true},{col:"#7ac87a",lbl:"Simulato combinato"},{col:"#e8b040",lbl:"Ideale",dash:true}]
                                        .map(({col,lbl,dash})=>(
                                        <div key={lbl} style={{display:"flex",alignItems:"center",gap:6}}>
                                            <div style={{width:20,height:2,background:dash?"none":col,borderTop:dash?`2px dashed ${col}`:"none"}}/>
                                            <span style={{fontSize:12,color:"#5a8a5a"}}>{lbl}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── Catalogo pannelli individuali (cliccabili per dettaglio) ── */}
                    <div style={{ fontSize:12, color:"#3a6a3a", marginBottom:10, letterSpacing:1 }}>
                        Clicca un pannello per simulazione RT60 individuale
                    </div>
                    {Object.entries(PANELS).map(([name, props]) => (
                        <PanelCard key={name} name={name} props={props}
                            neededSA={neededSA} sa={sa} rtI={rtI} V={V}
                            isSelected={selected===name}
                            onClick={() => setSelected(s => s===name ? null : name)}
                        />
                    ))}
                </Sec>
            );
        }

        // ─── PIANO-B ─ tastiera allineata al grafico modi (scala log, range reg.B) ──
        function PianoB({ fMin, fMax, fToX }) {
            const BLACKS = new Set([1,3,6,8,10]);
            const s0 = Math.ceil(12*Math.log2(fMin/440)+57);
            const s1 = Math.floor(12*Math.log2(fMax/440)+57);
            const keys = [];
            for (let st=s0; st<=s1; st++) {
                const freq = 440 * Math.pow(2, (st-57)/12);
                if (freq < fMin || freq > fMax) continue;
                const pos = ((st%12)+12)%12;
                const isBlack = BLACKS.has(pos);
                const {note, oct} = freqToNote(freq);
                keys.push({ st, freq, isBlack, note, oct });
            }
            const whites = keys.filter(k => !k.isBlack);
            return (
                <div style={{ position:"absolute", bottom:0, left:0, right:0, height:22, pointerEvents:"none" }}>
                    <svg width="100%" height="22">
                        {whites.map((k,i) => {
                            const x = fToX(k.freq);
                            const next = whites[i+1];
                            const w = next ? fToX(next.freq)-x : 2;
                            return (
                                <g key={k.st}>
                                    <rect x={`${x}%`} width={`${Math.max(w,0.4)}%`} y={0} height={22}
                                        fill="#0c1a0c" stroke="#1a3a1a" strokeWidth={0.5} />
                                    {k.note==="C" && (
                                        <text x={`${x+w/2}%`} y={18} textAnchor="middle"
                                            fontSize={9} fill="#3a6a3a" fontFamily="monospace">
                                            {k.note}{k.oct}
                                        </text>
                                    )}
                                </g>
                            );
                        })}
                        {keys.filter(k=>k.isBlack).map(k => {
                            const x = fToX(k.freq);
                            const fP = 440*Math.pow(2,(k.st-1-57)/12);
                            const fN = 440*Math.pow(2,(k.st+1-57)/12);
                            const w = Math.max(fToX(fN)-fToX(fP), 0.3)*0.5;
                            return (
                                <rect key={k.st} x={`${x-w/2}%`} width={`${w}%`} y={0} height={14}
                                    fill="#0a0d0a" stroke="#050905" strokeWidth={0.5} />
                            );
                        })}
                    </svg>
                </div>
            );
        }

        // ─── APP ─────────────────────────────────────────────────────────────────────

        const TABS = [
            { id:"misurazioni", label:"Misurazioni" },
            { id:"risultati",   label:"Analisi & Correzione" },
            { id:"modi",        label:"Modi Propri" }
        ];

        function App() {
            const [tab, setTab]         = useState("misurazioni");
            const [dims, setDims]       = useState({ L:"5", W:"4", H:"3" });
            const [wetness, setWetness] = useState(0.2);
            const [formula, setFormula] = useState("sabine"); // "sabine" | "eyring"

            // Superfici: ogni elemento ha { id, label, material, area, fixed, parentId? }
            // parentId=null → superficie principale; parentId=X → sotto-superficie di X
            const [surfaces, setSurfaces] = useState(() => {
                const parquet = "Legno parquet su cls";
                const intonaco = "Intonaco / Marmo / Piastrelle";
                return [
                    { id:"Pavimento",         label:"Pavimento",         material:parquet,   area:"", fixed:true,  parentId:null },
                    { id:"Soffitto",          label:"Soffitto",          material:intonaco,  area:"", fixed:true,  parentId:null },
                    { id:"Parete Frontale",   label:"Parete Frontale",   material:intonaco,  area:"", fixed:true,  parentId:null },
                    { id:"Parete Posteriore", label:"Parete Posteriore", material:intonaco,  area:"", fixed:true,  parentId:null },
                    { id:"Parete Sinistra",   label:"Parete Sinistra",   material:intonaco,  area:"", fixed:true,  parentId:null },
                    { id:"Parete Destra",     label:"Parete Destra",     material:intonaco,  area:"", fixed:true,  parentId:null },
                ];
            });
            // pannelli extra (aggiuntivi, con area e tipo selezionabile)
            const [extraPanels, setExtraPanels] = useState([]);

            // Misurazioni fonometriche: 3 misure per banda (125–4000 Hz)
            const [measurements, setMeasurements] = useState({
                125:  ["1.51","1.86","1.70"],
                250:  ["1.70","1.74","1.42"],
                500:  ["1.73","1.74","1.67"],
                1000: ["1.57","1.45","1.57"],
                2000: ["1.47","1.47","1.54"],
                4000: ["1.35","1.35","1.34"],
            });
            const [showMeas, setShowMeas]     = useState(false);
            const [measActive, setMeasActive] = useState(false); // OFF di default

            const [showEQ, setShowEQ]   = useState(true);
            const [noteAxis, setNoteAxis] = useState(false);
            const [mType, setMType]     = useState("all");
            const [mAxis, setMAxis]     = useState("all");
            const [zoomModi, setZoomModi] = useState(1);
            const [hoveredFreq, setHoveredFreq] = useState(null);
            const lastTapRef = React.useRef({freq:null, time:0});
            const modiScrollRef = React.useRef(null);

            const L = parseFloat(dims.L) || 0;
            const W = parseFloat(dims.W) || 0;
            const H = parseFloat(dims.H) || 0;
            const V = L * W * H;
            const Stot = roomSurface(L, W, H);
            const ready = V > 0;

            const autoA = useMemo(() => ({
                "Pavimento":         (L*W).toFixed(1),
                "Soffitto":          (L*W).toFixed(1),
                "Parete Frontale":   (W*H).toFixed(1),
                "Parete Posteriore": (W*H).toFixed(1),
                "Parete Sinistra":   (L*H).toFixed(1),
                "Parete Destra":     (L*H).toFixed(1),
            }), [L, W, H]);

            // ── calcolo assorbimento con gerarchia padre/figlio ──────────────────────
            // Per ogni superficie principale: area_netta = area_padre - Σ(area_figli)
            // Ogni sotto-superficie contribuisce con il proprio materiale sulla propria area.
            const sa = useMemo(() => {
                const result = {};
                BANDS.forEach(f => { result[f] = 0; });

                // Superfici principali (parentId === null)
                const parents = surfaces.filter(s => !s.parentId);
                parents.forEach(parent => {
                    const parentArea = parseFloat(parent.area) || parseFloat(autoA[parent.label]) || 0;
                    const children   = surfaces.filter(s => s.parentId === parent.id);
                    const childAreaTotal = children.reduce((acc, c) => acc + (parseFloat(c.area) || 0), 0);
                    const netArea = Math.max(0, parentArea - childAreaTotal);

                    // contributo netto del padre
                    const mP = MATERIALS[parent.material];
                    if (mP && netArea > 0) BANDS.forEach(f => { result[f] += mP[f] * netArea; });

                    // contributo di ogni sotto-superficie col suo materiale
                    children.forEach(child => {
                        const cArea = parseFloat(child.area) || 0;
                        const mC = MATERIALS[child.material];
                        if (mC && cArea > 0) BANDS.forEach(f => { result[f] += mC[f] * cArea; });
                    });
                });

                // pannelli extra
                extraPanels.forEach(ep => {
                    const tp = PANELS[ep.panel], ta = parseFloat(ep.area) || 0;
                    if (tp && ta > 0) BANDS.forEach(f => { result[f] += tp[f] * ta; });
                });
                return result;
            }, [surfaces, extraPanels, autoA]);

            // RT60 Sabine e Eyring
            const rtSabine = useMemo(() => ready ? rt60calc(V, sa)         : {}, [V, sa, ready]);
            const rtEyring = useMemo(() => ready ? rt60eyring(V, sa, Stot) : {}, [V, sa, Stot, ready]);
            const rtC      = formula === "eyring" ? rtEyring : rtSabine;

            // RT medio reale (media aritmetica delle 6 bande Sabine) — usato per Δf e f2
            const rtMedVal = useMemo(() => ready ? rtMedio(rtC) : 0.5, [rtC, ready]);
            // f1 (primo modo) = C/(2·L_max), f2 (fine reg. B) = 1875·√(RT_medio/V)
            const f1RegB = ready ? Math.round((C/2) / Math.max(L,W,H) * 10) / 10 : 34;
            const f2RegB = useMemo(() => ready ? f2regB(rtMedVal, V) : 200, [rtMedVal, V, ready]);
            // Δf larghezza di banda attorno ad ogni modo
            const Δf     = useMemo(() => deltaf(rtMedVal), [rtMedVal]);

            // RT60 da misurazioni fonometriche (media M1/M2/M3)
            const rtMeasRaw = useMemo(() => rt60fromMeasurements(measurements), [measurements]);
            const rtMeas    = measActive ? rtMeasRaw : {}; // disabilitato → dict vuoto
            const saMeas    = useMemo(() => ready ? saFromRT(V, rtMeasRaw) : {}, [V, rtMeasRaw, ready]);

            const rtI    = useMemo(() => ready ? rt60ideal(V, wetness) : {}, [V, wetness, ready]);
            const modes  = useMemo(() => ready ? roomModes(L, W, H, f2RegB) : [], [L, W, H, f2RegB, ready]);
            const eqData = useMemo(() => ready ? roomResponse(L, W, H, rtC) : [], [L, W, H, rtC, ready]);
            const Fs     = useMemo(() => ready ? schroeder(V, rtC[500]) : 200, [V, rtC, ready]);

            const neededSA = useMemo(() => {
                const n = {};
                BANDS.forEach(f => {
                    const c  = rtC[f] > 0 ? (0.161*V) / rtC[f] : 0;
                    const id = rtI[f] > 0 ? (0.161*V) / rtI[f] : 0;
                    n[f] = Math.max(0, Math.round((id-c)*10)/10);
                });
                return n;
            }, [rtC, rtI, V]);

            // Chart data: Sabine + Eyring + misurato (se attivo) + ideale
            const rt60Chart = BANDS.map(f => ({
                f: `${f}Hz`,
                Sabine:   rtSabine[f] || 0,
                Eyring:   rtEyring[f] || 0,
                Misurato: measActive ? (rtMeasRaw[f] || null) : null,
                Ideale:   rtI[f]      || 0,
            }));

            const hzTicks   = [20, 50, 100, 200, 500, 1000, 2000, 4000];
            const noteTicks = useMemo(() => {
                const t = [], s0=Math.ceil(12*Math.log2(20/440)+57), s1=Math.floor(12*Math.log2(4000/440)+57);
                for (let s=s0; s<=s1; s+=5) t.push(Math.round(440*Math.pow(2,(s-57)/12)*10)/10);
                return t;
            }, []);

            // ── helpers superfici ────────────────────────────────────────────────────
            function addSurface() {
                setSurfaces(ss => [...ss, {
                    id:`extra_${Date.now()}`, label:"Superficie aggiuntiva",
                    material:Object.keys(MATERIALS)[0], area:"", fixed:false, parentId:null
                }]);
            }
            function removeSurface(id) {
                // rimuove anche eventuali figli
                setSurfaces(ss => ss.filter(s => s.id !== id && s.parentId !== id));
            }
            function addSubSurface(parentId) {
                setSurfaces(ss => {
                    // se il padre non ha area esplicita, la scriviamo subito con il valore auto
                    const parent = ss.find(s => s.id === parentId);
                    const needsFill = parent && !parent.area;
                    const autoVal = needsFill ? (autoA[parent.label] || "") : null;
                    return [
                        ...ss.map(s => (needsFill && s.id === parentId) ? {...s, area: autoVal} : s),
                        { id:`sub_${Date.now()}`, label:"Sotto-superficie",
                          material:Object.keys(MATERIALS)[0], area:"", fixed:false, parentId }
                    ];
                });
            }
            function removeSubSurface(id) { setSurfaces(ss => ss.filter(s => s.id !== id)); }
            function updateSurface(id, patch) {
                setSurfaces(ss => ss.map(s => s.id===id ? {...s,...patch} : s));
            }

            // helpers pannelli extra
            function addPanel() {
                setExtraPanels(eps => [...eps, { id:Date.now(), panel:Object.keys(PANELS)[0], area:"" }]);
            }
            function removePanel(id) { setExtraPanels(eps => eps.filter(p => p.id !== id)); }

            // update singola misurazione
            function setMeasVal(band, idx, val) {
                setMeasurements(m => {
                    const cur = [...(m[band] || ["","",""])];
                    cur[idx] = val;
                    return { ...m, [band]: cur };
                });
            }

            const wetnessLabel = wetness<=0.15 ? "Anechoico" : wetness<=0.2 ? "Control Room" : "Live Room";
            const isMob = useIsMobile();
            const F  = isMob ? 12 : 15;   // base font
            const P  = isMob ? 14 : 28;   // padding laterale principale
            const P2 = isMob ? 12 : 24;   // padding secondario

            return (
                <div style={{ minHeight:"100vh", background:"#050905", color:"#e8f4e8",
                    fontFamily:"'IBM Plex Mono','Courier New',monospace", fontSize:F, padding:"0 0 80px" }}>

                    {/* ── HEADER ── */}
                    <div style={{ background:"#0a160a", borderBottom:"2px solid #2a5a2a",
                        padding:isMob?"12px 14px":"18px 28px",
                        display:"flex", alignItems: isMob?"flex-start":"center",
                        flexDirection: isMob?"column":"row",
                        gap: isMob?10:20, flexWrap:"wrap" }}>
                        {/* Logo + badge volume sulla stessa riga su mobile */}
                        <div style={{ display:"flex", alignItems:"center", width:"100%", justifyContent:"space-between" }}>
                            <div>
                                <div style={{ fontSize:isMob?10:12, letterSpacing:4, color:"#5aaa5a", textTransform:"uppercase", marginBottom:2 }}>acoustic calculator</div>
                                <div style={{ fontSize:isMob?22:32, fontWeight:700, color:"#c8eec8", letterSpacing:-1, lineHeight:1 }}>Leo-Calc</div>
                            </div>
                            {ready && (
                                <div style={{ background:"#0e200e", border:"1px solid #3a8a3a",
                                    borderRadius:6, padding: isMob?"6px 10px":"10px 18px",
                                    fontSize:isMob?12:17, color:"#8ae08a", fontWeight:700, whiteSpace:"nowrap" }}>
                                    {V.toFixed(1)} m³ · Fs {Fs} Hz
                                </div>
                            )}
                        </div>

                        {/* Wetness slider — full width su mobile */}
                        <div style={{ display:"flex", flexDirection:"column", gap:4, width: isMob?"100%":"auto", minWidth: isMob?0:200 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                                <span style={{ fontSize:isMob?10:12, letterSpacing:3, color:"#5aaa5a", textTransform:"uppercase" }}>Wetness</span>
                                <div style={{ background:"#0e200e", border:"1px solid #3a7a3a", borderRadius:4,
                                    padding:"2px 8px", fontSize:isMob?14:17, fontWeight:700, color:"#c8eec8", minWidth:48, textAlign:"center" }}>
                                    {wetness.toFixed(2)}
                                </div>
                            </div>
                            <input type="range" min="0.1" max="0.3" step="0.01" value={wetness}
                                onChange={e => setWetness(parseFloat(e.target.value))}
                                style={{ width:"100%", accentColor:"#7ac87a", cursor:"pointer" }} />
                            <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#4a8a4a" }}>
                                <span>Dry</span><span style={{ color:"#7ac87a" }}>{wetnessLabel}</span><span>Wet</span>
                            </div>
                        </div>
                    </div>

                    {/* ── TABS ── */}
                    <div style={{ display:"flex", borderBottom:"2px solid #1a3a1a",
                        padding: isMob?"0 4px":"0 28px", background:"#070e07",
                        overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
                        {TABS.map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} style={{
                                background:"none", border:"none", fontFamily:"inherit",
                                borderBottom: tab===t.id ? "3px solid #7ac87a" : "3px solid transparent",
                                color: tab===t.id ? "#c8eec8" : "#4a7a4a",
                                padding: isMob?"10px 10px 8px":"16px 22px 13px",
                                fontSize: isMob?11:16, letterSpacing: isMob?1:2,
                                textTransform:"uppercase", cursor:"pointer",
                                fontWeight: tab===t.id ? 700 : 400,
                                whiteSpace:"nowrap", flexShrink:0,
                            }}>{t.label}</button>
                        ))}
                    </div>

                    <div style={{ padding:`${P2}px ${P}px`, maxWidth:1000, margin:"0 auto" }}>

                        {/* ══ MISURAZIONI ══ */}
                        {tab === "misurazioni" && (
                            <div style={{ display:"flex", flexDirection:"column", gap:28 }}>

                                <Sec title="DIMENSIONI STANZA">
                                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:isMob?8:14 }}>
                                        {[["L","L (m)"],["W","W (m)"],["H","H (m)"]].map(([k, lbl]) => (
                                            <label key={k} style={{ display:"flex", flexDirection:"column", gap:5 }}>
                                                <span style={{ fontSize:isMob?11:13, letterSpacing:2, color:"#6aaa6a", textTransform:"uppercase" }}>{lbl}</span>
                                                <input type="number" min="0" step="0.1" value={dims[k]}
                                                    onChange={e => setDims(d => ({...d, [k]: e.target.value}))}
                                                    style={inp} placeholder="0.0" />
                                            </label>
                                        ))}
                                    </div>
                                    {ready && (
                                        <div style={{ fontSize:isMob?11:14, color:"#5a9a5a", marginTop:4, background:"#0a180a", padding:"7px 10px", borderRadius:4, border:"1px solid #1e3e1e", lineHeight:1.6 }}>
                                            {L.toFixed(1)} × {W.toFixed(1)} × {H.toFixed(1)} m · L/W:{(L/W).toFixed(2)} · L/H:{(L/H).toFixed(2)}
                                        </div>
                                    )}
                                </Sec>

                                {/* SUPERFICI */}
                                <Sec title="MATERIALI SUPERFICI">
                                    {/* Render solo le superfici principali (parentId === null) */}
                                    {surfaces.filter(s => !s.parentId).map(parent => {
                                        const children = surfaces.filter(s => s.parentId === parent.id);
                                        const parentAutoArea = autoA[parent.label] || "";
                                        const parentArea = parseFloat(parent.area) || parseFloat(parentAutoArea) || 0;
                                        const childSum   = children.reduce((a,c) => a + (parseFloat(c.area)||0), 0);
                                        const netArea    = Math.max(0, parentArea - childSum);
                                        const hasOverlap = childSum > parentArea && parentArea > 0;

                                        return (
                                            <div key={parent.id} style={{ marginBottom:10 }}>
                                                {/* ── riga superficie principale ── */}
                                                {isMob ? (
                                                    <div>
                                                        <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:5 }}>
                                                            {parent.fixed
                                                                ? <span style={{ fontSize:F, color:"#7ab87a", fontWeight:600, flex:1 }}>{parent.label}</span>
                                                                : <input value={parent.label} onChange={e => updateSurface(parent.id,{label:e.target.value})}
                                                                    style={{ ...inp, flex:1 }} placeholder="Nome" />
                                                            }
                                                            <button onClick={() => addSubSurface(parent.id)} title="Sotto-superficie" style={{
                                                                background:"#091409", border:"1px solid #2a5a2a", color:"#5aaa5a",
                                                                borderRadius:4, width:30, height:30, fontSize:16, cursor:"pointer",
                                                                fontFamily:"inherit", flexShrink:0, lineHeight:1, padding:0,
                                                            }}>⊕</button>
                                                            {!parent.fixed && <DelBtn onClick={() => removeSurface(parent.id)} />}
                                                        </div>
                                                        <div style={{ display:"grid", gridTemplateColumns:"1fr 72px", gap:6 }}>
                                                            <select value={parent.material} onChange={e => updateSurface(parent.id,{material:e.target.value})} style={sel}>
                                                                {Object.keys(MATERIALS).map(m => <option key={m}>{m}</option>)}
                                                            </select>
                                                            <input type="number" min="0" step="0.1" value={parent.area}
                                                                onChange={e => updateSurface(parent.id,{area:e.target.value})}
                                                                style={{ ...inp, textAlign:"right" }} placeholder={parentAutoArea||"m²"} />
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div style={{ display:"grid", gridTemplateColumns:"150px 1fr 80px auto auto", gap:8, alignItems:"center" }}>
                                                        {parent.fixed
                                                            ? <span style={{ fontSize:F, color:"#7ab87a", fontWeight:600 }}>{parent.label}</span>
                                                            : <input value={parent.label} onChange={e => updateSurface(parent.id,{label:e.target.value})}
                                                                style={{ ...inp, fontSize:13 }} placeholder="Nome superficie" />
                                                        }
                                                        <select value={parent.material} onChange={e => updateSurface(parent.id,{material:e.target.value})} style={sel}>
                                                            {Object.keys(MATERIALS).map(m => <option key={m}>{m}</option>)}
                                                        </select>
                                                        <input type="number" min="0" step="0.1" value={parent.area}
                                                            onChange={e => updateSurface(parent.id,{area:e.target.value})}
                                                            style={{ ...inp, textAlign:"right" }} placeholder={parentAutoArea||"m²"} />
                                                        <button onClick={() => addSubSurface(parent.id)} title="Aggiungi sotto-superficie" style={{
                                                            background:"#091409", border:"1px solid #2a5a2a", color:"#5aaa5a",
                                                            borderRadius:4, width:34, height:34, fontSize:17, cursor:"pointer",
                                                            fontFamily:"inherit", flexShrink:0, lineHeight:1, padding:0,
                                                        }}>⊕</button>
                                                        {parent.fixed ? <div style={{ width:34 }}/> : <DelBtn onClick={() => removeSurface(parent.id)} />}
                                                    </div>
                                                )}

                                                {/* info area netta */}
                                                {children.length > 0 && (
                                                    <div style={{ display:"flex", gap:10, flexWrap:"wrap", fontSize:11, marginTop:3,
                                                        paddingLeft: isMob?0:20, color:hasOverlap?"#cc5030":"#4a8a4a" }}>
                                                        <span>Lorda: {parentArea.toFixed(1)} m²</span>
                                                        <span>−{childSum.toFixed(1)} m²</span>
                                                        <span style={{ color:hasOverlap?"#cc5030":"#7ac87a", fontWeight:600 }}>
                                                            {hasOverlap ? "⚠ eccede!" : `Netta: ${netArea.toFixed(1)} m²`}
                                                        </span>
                                                    </div>
                                                )}

                                                {/* sotto-superfici */}
                                                {children.map(child => (
                                                    <div key={child.id} style={{ marginTop:6, paddingLeft: isMob?8:16,
                                                        borderLeft:"2px solid #2a5a2a" }}>
                                                        {isMob ? (
                                                            <div>
                                                                <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                                                                    <input value={child.label} onChange={e => updateSurface(child.id,{label:e.target.value})}
                                                                        style={{ ...inp, flex:1, borderColor:"#2a5a2a", background:"#060d06" }}
                                                                        placeholder="es. Finestra" />
                                                                    <DelBtn onClick={() => removeSubSurface(child.id)} />
                                                                </div>
                                                                <div style={{ display:"grid", gridTemplateColumns:"1fr 72px", gap:6 }}>
                                                                    <select value={child.material} onChange={e => updateSurface(child.id,{material:e.target.value})}
                                                                        style={{ ...sel, borderColor:"#2a5a2a", background:"#060d06" }}>
                                                                        {Object.keys(MATERIALS).map(m => <option key={m}>{m}</option>)}
                                                                    </select>
                                                                    <input type="number" min="0" step="0.1" value={child.area}
                                                                        onChange={e => updateSurface(child.id,{area:e.target.value})}
                                                                        style={{ ...inp, textAlign:"right", borderColor:"#2a5a2a", background:"#060d06" }}
                                                                        placeholder="m²" />
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div style={{ display:"grid", gridTemplateColumns:"130px 1fr 80px auto", gap:8, alignItems:"center" }}>
                                                                <input value={child.label} onChange={e => updateSurface(child.id,{label:e.target.value})}
                                                                    style={{ ...inp, fontSize:12, borderColor:"#2a5a2a", background:"#060d06" }}
