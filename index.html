                                                        angle={noteAxis?-45:0} textAnchor={noteAxis?"end":"middle"}
                                                        height={noteAxis?(isMob?36:48):(isMob?18:24)} allowDataOverflow={false} />
                                                    <YAxis tick={{ fill:"#5a9a5a", fontSize:isMob?9:14 }} unit="dB" domain={[-24,24]} />
                                                    <Tooltip contentStyle={{ background:"#0b1a0b", border:"1px solid #3a7a3a", fontSize:isMob?11:14, color:"#c8eec8" }}
                                                        formatter={v => [`${v} dB`,"Livello"]}
                                                        labelFormatter={f => `${f} Hz · ${noteLabel(f)}`} />
                                                    <ReferenceLine y={0} stroke="#2a5a2a" strokeDasharray="4 4" />
                                                    <Line type="monotone" dataKey="dB" stroke="#3ae870" strokeWidth={isMob?1.5:2} dot={false} isAnimationActive={false} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>

                                        <Piano eqData={eqData} />
                                    </div>

                                    {/* TRATTAMENTO */}
                                    <TreatmentSection
                                        neededSA={neededSA} sa={sa} rtI={rtI} V={V} Fs={Fs}
                                    />
                                </>}
                            </div>
                        )}

                        {/* ══ MODI ══ */}
                        {tab === "modi" && (
                            <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                                {!ready && <Empty />}
                                {ready && (() => {
                                    const filteredModes = modes.filter(m =>
                                        (mType==="all" || m.type===mType) && (mAxis==="all" || m.axis===mAxis)
                                    );

                                    // ── Grafico Rayleigh ─────────────────────────────────────────────
                                    // Scala LOG 20 Hz → f2RegB, asse Y in dB[□]
                                    // Le barre si sommano in [□] (lineare) poi si convertono in dB
                                    const F_MIN_B = 20, F_MAX_B = Math.ceil(f2RegB);
                                    const logMinB = Math.log10(F_MIN_B), logMaxB = Math.log10(F_MAX_B);
                                    const logRangeB = logMaxB - logMinB;
                                    function fToX(f) { return ((Math.log10(Math.max(f,F_MIN_B))-logMinB)/logRangeB)*100; }

                                    // Costruisci griglia di frequenze (quinti di semitono: 2^(1/60))
                                    // per sommare le ampiezze in [□] su ogni cella
                                    const GRID_N = 300;
                                    const grid = [];
                                    for (let i=0; i<GRID_N; i++) {
                                        grid.push({ f: F_MIN_B * Math.pow(F_MAX_B/F_MIN_B, i/GRID_N), amp_sq: 0 });
                                    }
                                    // Per ogni modo filtrato, somma la sua ampiezza [□] alle celle che cadono entro ±Δf/2
                                    filteredModes.forEach(m => {
                                        const amp = modeAmplitude(m.nx, m.ny, m.nz);
                                        const halfDf = Δf / 2;
                                        grid.forEach(cell => {
                                            if (cell.f >= m.freq - halfDf && cell.f <= m.freq + halfDf) {
                                                cell.amp_sq += amp; // somma in [□]
                                            }
                                        });
                                    });
                                    // Converti in dB[□]: 20·log10(amp_sq/1)
                                    const maxAmpSq = Math.max(...grid.map(c => c.amp_sq), 1);
                                    const chartData = grid.filter(c => c.amp_sq > 0).map(c => ({
                                        f: Math.round(c.f*10)/10,
                                        dBsq: Math.round(20*Math.log10(c.amp_sq)*10)/10,
                                    }));
                                    // Anche data piena per recharts (inclusi 0)
                                    const maxDB = Math.round(20*Math.log10(maxAmpSq)*10)/10 + 2;

                                    // Colori per tipo modo
                                    const modeColor = m => m.type==="assiale"?"#7ac87a":m.type==="tangenziale"?"#e8b040":"#5a9aaa";

                                    return <>
                                        {/* Info parametri */}
                                        <div style={{ display:"grid", gridTemplateColumns: isMob?"repeat(2,1fr)":"repeat(4,1fr)", gap:isMob?6:8, marginBottom:8 }}>
                                            {[
                                                { label:"f₁ reg. B", val:`${f1RegB} Hz`, sub:"primo modo" },
                                                { label:"f₂ reg. B", val:`${Math.round(f2RegB)} Hz`, sub:`1875·√(RT̄/V)` },
                                                { label:"Δf", val:`${Δf.toFixed(2)} Hz`, sub:`2.2 / RT̄=${rtMedVal.toFixed(2)}s` },
                                                { label:"Modi totali", val:modes.length, sub:`fino a ${Math.round(f2RegB)} Hz` },
                                            ].map(({label,val,sub}) => (
                                                <div key={label} style={{ background:"#0a180a", border:"1px solid #1e3e1e", borderRadius:5, padding:"8px 10px", textAlign:"center" }}>
                                                    <div style={{ fontSize:11, color:"#4a8a4a", letterSpacing:2, textTransform:"uppercase" }}>{label}</div>
                                                    <div style={{ fontSize:18, fontWeight:700, color:"#c8eec8", marginTop:2 }}>{val}</div>
                                                    <div style={{ fontSize:11, color:"#3a6a3a", fontFamily:"monospace" }}>{sub}</div>
                                                </div>
                                            ))}
                                        </div>

                                        {/* Grafico Rayleigh interattivo */}
                                        <div style={{ background:"#070e07", border:"1px solid #1a3a1a", borderRadius:8, padding:"14px 10px 8px" }}>
                                            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                                                <div style={{ fontSize:12, letterSpacing:3, color:"#4a8a4a", textTransform:"uppercase" }}>
                                                    Grafico modi reg. B — Ampiezze A [□]
                                                </div>
                                                {/* Zoom control */}
                                                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                                    <span style={{ fontSize:11, color:"#3a6a3a" }}>Zoom</span>
                                                    <input type="range" min="1" max="8" step="0.5" value={zoomModi}
                                                        onChange={e => setZoomModi(parseFloat(e.target.value))}
                                                        style={{ width:80, accentColor:"#7ac87a", cursor:"pointer" }} />
                                                    <span style={{ fontSize:11, color:"#7ac87a", minWidth:24 }}>{zoomModi.toFixed(1)}×</span>
                                                    {zoomModi > 1 && (
                                                        <button onClick={() => setZoomModi(1)} style={{
                                                            background:"#0a140a", border:"1px solid #2a4a2a", color:"#5a9a5a",
                                                            borderRadius:3, padding:"2px 8px", fontSize:11, cursor:"pointer", fontFamily:"inherit",
                                                        }}>reset</button>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Contenitore scrollabile — SVG cresce in pixel fisici */}
                                            <div ref={modiScrollRef} style={{ overflowX:"auto", overflowY:"hidden",
                                                border:"1px solid #0f1e0f", borderRadius:4 }}>
                                                {(() => {
                                                    const BASE_W  = 700;
                                                    const SVG_W   = Math.round(BASE_W * zoomModi);
                                                    const SVG_H   = 260;
                                                    const PIANO_H = 26;
                                                    const CHART_H = SVG_H - PIANO_H;
                                                    const PAD_L = 38, PAD_R = 8, PAD_T = 8;
                                                    const DRAW_W  = SVG_W - PAD_L - PAD_R;

                                                    const maxSumSq2 = Math.max(...grid.map(c=>c.amp_sq), 1);
                                                    const yTicks = [];
                                                    for(let v=0; v<=Math.ceil(maxSumSq2/25)*25; v+=25) yTicks.push(v);

                                                    const fToXpx = f => PAD_L + ((Math.log10(Math.max(f,F_MIN_B))-Math.log10(F_MIN_B))/(Math.log10(F_MAX_B)-Math.log10(F_MIN_B)))*DRAW_W;
                                                    const BAR_W = 3;

                                                    // Doppio tap: zoom 7× e centra la barra nel container
                                                    function handleSvgClick(e) {
                                                        const rect = e.currentTarget.getBoundingClientRect();
                                                        const xPx = (e.clientX - rect.left) * (SVG_W / rect.width);
                                                        const logF = Math.log10(F_MIN_B) + ((xPx - PAD_L) / DRAW_W) * (Math.log10(F_MAX_B) - Math.log10(F_MIN_B));
                                                        const fHz = Math.pow(10, logF);
                                                        // Trova la barra più vicina
                                                        let nearest = null, bestDist = Infinity;
                                                        filteredModes.forEach(m => {
                                                            const d = Math.abs(fHz - m.freq);
                                                            if (d < bestDist && d < Δf) { bestDist = d; nearest = m; }
                                                        });
                                                        if (!nearest) return;
                                                        const now = Date.now();
                                                        const last = lastTapRef.current;
                                                        if (last.freq === nearest.freq && now - last.time < 350) {
                                                            // Doppio tap — zoom 7× e centra
                                                            const TARGET_ZOOM = 7;
                                                            setZoomModi(TARGET_ZOOM);
                                                            // Calcola la posizione X della barra nel nuovo SVG e centra il container
                                                            const newSvgW = Math.round(BASE_W * TARGET_ZOOM);
                                                            const newDrawW = newSvgW - PAD_L - PAD_R;
                                                            const xBar = PAD_L + ((Math.log10(nearest.freq)-Math.log10(F_MIN_B))/(Math.log10(F_MAX_B)-Math.log10(F_MIN_B)))*newDrawW;
                                                            // Ritarda il scroll dopo il re-render
                                                            setTimeout(() => {
                                                                if (modiScrollRef.current) {
                                                                    const containerW = modiScrollRef.current.clientWidth;
                                                                    modiScrollRef.current.scrollLeft = Math.max(0, xBar - containerW / 2);
                                                                }
                                                            }, 30);
                                                            lastTapRef.current = {freq:null, time:0};
                                                        } else {
                                                            lastTapRef.current = {freq:nearest.freq, time:now};
                                                        }
                                                    }

                                                    return (
                                                        <svg width={SVG_W} height={SVG_H}
                                                            style={{ display:"block", fontFamily:"'IBM Plex Mono',monospace", cursor:"crosshair" }}
                                                            onMouseMove={e => {
                                                                const rect = e.currentTarget.getBoundingClientRect();
                                                                const xPx = (e.clientX - rect.left) * (SVG_W / rect.width);
                                                                const logF = Math.log10(F_MIN_B) + ((xPx - PAD_L) / DRAW_W) * (Math.log10(F_MAX_B) - Math.log10(F_MIN_B));
                                                                const fHz = Math.pow(10, logF);
                                                                setHoveredFreq(fHz>=F_MIN_B&&fHz<=F_MAX_B ? fHz : null);
                                                            }}
                                                            onMouseLeave={() => setHoveredFreq(null)}
                                                            onClick={handleSvgClick}>

                                                            <rect x={0} y={0} width={SVG_W} height={SVG_H} fill="#070e07"/>

                                                            {/* Griglia orizzontale */}
                                                            {yTicks.map(v => {
                                                                const y = PAD_T + (CHART_H-PAD_T)*(1-v/maxSumSq2);
                                                                return (
                                                                    <g key={v}>
                                                                        <line x1={PAD_L} x2={SVG_W-PAD_R} y1={y} y2={y} stroke="#0f1e0f" strokeWidth={1}/>
                                                                        <text x={PAD_L-4} y={y+4} textAnchor="end" fontSize={9} fill="#3a6a3a">{v}</text>
                                                                    </g>
                                                                );
                                                            })}
                                                            <text x={10} y={CHART_H/2} textAnchor="middle" fontSize={9} fill="#4a8a4a"
                                                                transform={`rotate(-90,10,${CHART_H/2})`}>A [□]</text>

                                                            {/* Griglia verticale Hz */}
                                                            {[20,25,30,40,50,60,80,100,125,150,175,200,250,300].filter(f=>f<=F_MAX_B+5).map(f => {
                                                                const x = fToXpx(f);
                                                                return (
                                                                    <g key={f}>
                                                                        <line x1={x} x2={x} y1={PAD_T} y2={CHART_H} stroke="#0f1e0f" strokeWidth={1}/>
                                                                        <text x={x} y={CHART_H+11} textAnchor="middle" fontSize={8} fill="#3a6a3a">{f}</text>
                                                                    </g>
                                                                );
                                                            })}

                                                            {/* Linea f2 */}
                                                            {(()=>{
                                                                const x=fToXpx(f2RegB);
                                                                return<g>
                                                                    <line x1={x} x2={x} y1={PAD_T} y2={CHART_H} stroke="#ff8844" strokeWidth={1} strokeDasharray="4 3" opacity={0.5}/>
                                                                    <text x={x+3} y={PAD_T+10} fontSize={8} fill="#ff8844">f₂={Math.round(f2RegB)}Hz</text>
                                                                </g>;
                                                            })()}

                                                            {/* Barre modi — SOLO barre, tooltip separati sotto */}
                                                            {filteredModes.map((m,idx) => {
                                                                const amp  = modeAmplitude(m.nx, m.ny, m.nz);
                                                                const col  = modeColor(m);
                                                                const xC   = fToXpx(m.freq);
                                                                const xL   = fToXpx(Math.max(m.freq-Δf/2, F_MIN_B));
                                                                const xR   = fToXpx(Math.min(m.freq+Δf/2, F_MAX_B));
                                                                const barH = Math.max(2, (amp/maxSumSq2)*(CHART_H-PAD_T));
                                                                const isHov= hoveredFreq!==null && Math.abs(hoveredFreq-m.freq)<Δf;
                                                                return (
                                                                    <g key={idx}>
                                                                        <rect x={xL} width={Math.max(xR-xL,1)} y={CHART_H-barH} height={barH}
                                                                            fill={col} fillOpacity={isHov?0.38:0.13}/>
                                                                        <rect x={xC-BAR_W/2} width={BAR_W} y={CHART_H-barH} height={barH}
                                                                            fill={col} fillOpacity={isHov?1:0.88}/>
                                                                    </g>
                                                                );
                                                            })}

                                                            {/* Piano in basso */}
                                                            {(()=>{
                                                                const BLACKS=new Set([1,3,6,8,10]);
                                                                const s0=Math.ceil(12*Math.log2(F_MIN_B/440)+57);
                                                                const s1=Math.floor(12*Math.log2(F_MAX_B/440)+57);
                                                                const k2=[];
                                                                for(let st=s0;st<=s1;st++){
                                                                    const freq=440*Math.pow(2,(st-57)/12);
                                                                    if(freq<F_MIN_B||freq>F_MAX_B) continue;
                                                                    const pos=((st%12)+12)%12;
                                                                    k2.push({st,freq,isBlack:BLACKS.has(pos),...freqToNote(freq)});
                                                                }
                                                                const w2=k2.filter(k=>!k.isBlack);
                                                                const pY=SVG_H-PIANO_H;
                                                                return<g>
                                                                    <rect x={PAD_L} y={pY} width={DRAW_W} height={PIANO_H} fill="#060d06"/>
                                                                    {w2.map((k,i)=>{
                                                                        const x=fToXpx(k.freq);
                                                                        const n=w2[i+1];
                                                                        const w=Math.max(n?fToXpx(n.freq)-x:4,1);
                                                                        return<g key={k.st}>
                                                                            <rect x={x} y={pY} width={w-0.5} height={PIANO_H} fill="#0c180c" stroke="#1a3a1a" strokeWidth={0.5}/>
                                                                            {k.note==="C"&&<text x={x+w/2} y={pY+PIANO_H-5} textAnchor="middle" fontSize={8} fill="#3a6a3a">{k.note}{k.oct}</text>}
                                                                        </g>;
                                                                    })}
                                                                    {k2.filter(k=>k.isBlack).map(k=>{
                                                                        const x=fToXpx(k.freq);
                                                                        const fp=440*Math.pow(2,(k.st-1-57)/12);
                                                                        const fn=440*Math.pow(2,(k.st+1-57)/12);
                                                                        const w=Math.max((fToXpx(fn)-fToXpx(fp))*0.52,1);
                                                                        return<rect key={k.st} x={x-w/2} y={pY} width={w} height={PIANO_H*0.62} fill="#080d08" stroke="#040804" strokeWidth={0.5}/>;
                                                                    })}
                                                                </g>;
                                                            })()}

                                                            {/* Cursore verticale */}
                                                            {hoveredFreq&&hoveredFreq>=F_MIN_B&&hoveredFreq<=F_MAX_B&&(
                                                                <line x1={fToXpx(hoveredFreq)} x2={fToXpx(hoveredFreq)}
                                                                    y1={PAD_T} y2={CHART_H} stroke="#ffffff18" strokeWidth={1}/>
                                                            )}

                                                            {/* ── TOOLTIPS — ultimo layer, sempre sopra tutto ── */}
                                                            {filteredModes.map((m,idx) => {
                                                                const isHov = hoveredFreq!==null && Math.abs(hoveredFreq-m.freq)<Δf;
                                                                if (!isHov) return null;
                                                                const amp  = modeAmplitude(m.nx, m.ny, m.nz);
                                                                const col  = modeColor(m);
                                                                const xC   = fToXpx(m.freq);
                                                                const barH = Math.max(2, (amp/maxSumSq2)*(CHART_H-PAD_T));
                                                                const TIP_H = 40;
                                                                const TIP_W = 116;
                                                                // y: sopra la barra, ma mai sopra PAD_T
                                                                const tipY = Math.max(PAD_T + 2, CHART_H - barH - TIP_H - 4);
                                                                const tipX = Math.min(Math.max(xC - TIP_W/2, PAD_L + 2), SVG_W - PAD_R - TIP_W - 2);
                                                                return (
                                                                    <g key={`tip-${idx}`}>
                                                                        {/* Gambo verticale dalla cima della barra al tooltip */}
                                                                        <line x1={xC} x2={xC} y1={CHART_H-barH} y2={tipY+TIP_H}
                                                                            stroke={col} strokeWidth={1} strokeDasharray="2 2" opacity={0.5}/>
                                                                        <rect x={tipX} y={tipY} width={TIP_W} height={TIP_H} rx={3}
                                                                            fill="#071207" stroke={col} strokeWidth={1.2}/>
                                                                        <text x={tipX+6} y={tipY+14} fontSize={10} fill={col} fontWeight="bold">
                                                                            {m.freq} Hz  ({m.nx},{m.ny},{m.nz})
                                                                        </text>
                                                                        <text x={tipX+6} y={tipY+28} fontSize={9} fill="#8aaa8a">
                                                                            {amp.toFixed(0)} □  {m.type.slice(0,3).toUpperCase()}  {noteLabel(m.freq)}
                                                                        </text>
                                                                        <text x={tipX+6} y={tipY+TIP_H-4} fontSize={8} fill="#3a5a3a">
                                                                            doppio click → zoom
                                                                        </text>
                                                                    </g>
                                                                );
                                                            })}
                                                        </svg>
                                                    );
                                                })()}
                                            </div>

                                            {/* Legenda */}
                                            <div style={{ display:"flex", gap:14, marginTop:8, flexWrap:"wrap" }}>
                                                {[{col:"#7ac87a",lbl:"Assiale (100/ord.)"},{col:"#e8b040",lbl:"Tangenziale (70/ord.)"},{col:"#5a9aaa",lbl:"Obliquo (50/ord.)"}]
                                                    .map(({col,lbl})=>(
                                                    <div key={lbl} style={{display:"flex",alignItems:"center",gap:5}}>
                                                        <div style={{width:12,height:12,background:col}}/>
                                                        <span style={{fontSize:12,color:"#5a9a5a"}}>{lbl}</span>
                                                    </div>
                                                ))}
                                                <span style={{fontSize:11,color:"#3a6a3a",marginLeft:"auto"}}>
                                                    ±Δf/2 = ±{(Δf/2).toFixed(1)} Hz
                                                </span>
                                            </div>
                                        </div>

                                        {/* Filtri */}
                                        <div style={{ display:"flex", gap:12 }}>
                                            <select onChange={e => setMType(e.target.value)} style={sel}>
                                                <option value="all">Tutti i tipi</option>
                                                <option value="assiale">Assiali</option>
                                                <option value="tangenziale">Tangenziali</option>
                                                <option value="obliquo">Obliqui</option>
                                            </select>
                                            <select onChange={e => setMAxis(e.target.value)} style={sel}>
                                                <option value="all">Tutti gli assi</option>
                                                <option value="L">Asse L</option>
                                                <option value="W">Asse W</option>
                                                <option value="H">Asse H</option>
                                            </select>
                                        </div>

                                        {/* Lista modi */}
                                        <div style={{ maxHeight:400, overflowY:"auto" }}>
                                            {filteredModes.map((m, i) => {
                                                const amp = modeAmplitude(m.nx, m.ny, m.nz);
                                                const dBsq = Math.round(20*Math.log10(Math.max(amp,0.1))*10)/10;
                                                const col = modeColor(m);
                                                return (
                                                    <div key={i} style={{
                                                        display:"grid", gridTemplateColumns: isMob?"70px 1fr auto":"90px 100px 60px 60px 1fr 110px",
                                                        alignItems:"center", gap:isMob?6:10, padding: isMob?"5px 8px":"7px 12px",
                                                        background:"#060d06", border:`1px solid ${col}22`,
                                                        borderLeft:`3px solid ${col}`, borderRadius:4, marginBottom:4,
                                                    }}>
                                                        <span style={{ fontSize:isMob?13:16, fontWeight:700, color:col }}>
                                                            {m.freq}<span style={{ fontSize:isMob?10:12, color:"#3a6a3a" }}> Hz</span>
                                                        </span>
                                                        {isMob ? (
                                                            <span style={{ fontSize:10, color:"#4a8a4a" }}>({m.nx},{m.ny},{m.nz}) · {amp.toFixed(0)}□</span>
                                                        ) : (
                                                            <>
                                                                <span style={{ fontSize:12, color:"#4a8a4a" }}>({m.nx},{m.ny},{m.nz})</span>
                                                                <span style={{ fontSize:12, color:"#6a8a6a", textAlign:"right" }}>{amp.toFixed(0)} □</span>
                                                                <span style={{ fontSize:12, color:col, textAlign:"right", fontWeight:600 }}>{dBsq} dB</span>
                                                                <div style={{ background:"#0f1a0f", borderRadius:3, height:5 }}>
                                                                    <div style={{ width:`${Math.min(100, amp/100*100)}%`, background:col+"99", height:"100%", borderRadius:3 }} />
                                                                </div>
                                                            </>
                                                        )}
                                                        <span style={{ fontSize:isMob?10:12, color:col, textAlign:"right" }}>
                                                            {noteLabel(m.freq)} · {m.type.slice(0,3).toUpperCase()}
                                                        </span>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {/* Regione D */}
                                        <div>
                                            <div style={{ display:"flex", alignItems:"center", gap:10, margin:"14px 0 8px" }}>
                                                <div style={{ width:4, height:20, background:"#44ff88", borderRadius:2, flexShrink:0 }} />
                                                <span style={{ fontSize:16, color:"#44cc70", fontWeight:700 }}>
                                                    Regione D — Diffuso (f &gt; {Math.round(f2RegB)} Hz)
                                                </span>
                                                <div style={{ flex:1, height:1, background:"#44cc7033" }} />
                                            </div>
                                            <div style={{ fontSize:14, color:"#3a7a3a", padding:"12px 16px",
                                                background:"#060d06", border:"1px dashed #1a3a1a", borderRadius:5, lineHeight:1.8 }}>
                                                Campo sonoro prevalentemente diffuso — Schroeder: {Fs} Hz<br/>
                                                Intervento con <strong style={{color:"#6aaa6a"}}>pannelli diffusivi (Schroeder QRD)</strong> sulle superfici di prime riflessioni (Live End).
                                            </div>
                                        </div>
                                    </>;
                                })()}
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
