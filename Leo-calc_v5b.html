                                                                    background: i%2===0?"#080e08":"#0a140a",
                                                                    fontSize:14, fontWeight: row.label===formula?"700":"400" }}>
                                                                    {v ? v.toFixed(2) : "—"}
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                    {/* riga delta attivo vs ideale */}
                                                    <tr>
                                                        <td style={{ padding:"5px 8px", color:"#6a6a3a", fontSize:11 }}>Δ attivo</td>
                                                        {BANDS.map(f => {
                                                            const d = (rtC[f]||0) - (rtI[f]||0);
                                                            const ok = Math.abs(d)<0.1;
                                                            return (
                                                                <td key={f} style={{ padding:"5px 4px", textAlign:"center",
                                                                    color: ok?"#6aba6a":d>0?"#cc6040":"#aaaa40",
                                                                    fontSize:12, fontWeight:600 }}>
                                                                    {ok ? "✓" : (d>0?"+":"")+d.toFixed(2)}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>

                                        {/* αS Sabine per banda */}
                                        {ready && (
                                            <div style={{ marginTop:14, background:"#070d07", border:"1px solid #152515", borderRadius:6, padding:"10px 14px" }}>
                                                <div style={{ fontSize:12, letterSpacing:3, color:"#3a7a3a", textTransform:"uppercase", marginBottom:8 }}>
                                                    αS per banda (assorbimento calcolato)
                                                </div>
                                                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:5 }}>
                                                    {BANDS.map(f => (
                                                        <div key={f} style={{ textAlign:"center" }}>
                                                            <div style={{ fontSize:11, color:"#3a6a3a" }}>{f>=1000?(f/1000)+"k":f}Hz</div>
                                                            <div style={{ fontSize:14, color:"#7ac87a", fontWeight:600 }}>{(sa[f]||0).toFixed(2)}</div>
                                                            <div style={{ fontSize:10, color:"#2a5a2a" }}>m²Sab</div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div style={{ fontSize:12, color:"#3a6a3a", marginTop:6 }}>
                                                    S tot: {Stot.toFixed(1)} m² &nbsp;·&nbsp;
                                                    ᾱ@500Hz: {Stot>0 ? ((sa[500]||0)/Stot).toFixed(3) : "—"} &nbsp;·&nbsp;
                                                    V: {V.toFixed(1)} m³
                                                </div>
                                            </div>
                                        )}
                                    </Sec>

                                    {/* EQ TOGGLE */}
                                    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                                        <span style={{ fontSize:14, letterSpacing:3, color:"#5aaa5a", textTransform:"uppercase", fontWeight:700 }}>
                                            Risposta Frequenza — Sweet Spot
                                        </span>
                                        <button onClick={() => setShowEQ(v => !v)} style={{
                                            background: showEQ?"#0e200e":"#0c0c0c",
                                            border:`1px solid ${showEQ?"#5a9a5a":"#2a2a2a"}`,
                                            color: showEQ?"#8ae08a":"#444",
                                            padding:"6px 16px", fontSize:14, letterSpacing:2,
                                            cursor:"pointer", borderRadius:4, textTransform:"uppercase", fontFamily:"inherit",
                                        }}>{showEQ ? "ON" : "OFF"}</button>
                                    </div>

                                    {showEQ && (
                                        <div style={{ background:"#070e07", border:"1px solid #1e3e1e", borderRadius:8, padding:18 }}>
                                            <div style={{ display:"flex", gap:8, marginBottom:12, alignItems:"center" }}>
                                                <span style={{ fontSize:13, color:"#4a8a4a", letterSpacing:2 }}>ASSE:</span>
                                                {[{v:false,l:"Hz"},{v:true,l:"Note (⅕ semitono)"}].map(({v,l}) => (
                                                    <button key={l} onClick={() => setNoteAxis(v)} style={{
                                                        background: noteAxis===v ? "#0e200e" : "transparent",
                                                        border:`1px solid ${noteAxis===v?"#5a9a5a":"#222"}`,
                                                        color: noteAxis===v ? "#c8eec8" : "#4a7a4a",
                                                        padding:"4px 14px", fontSize:13, cursor:"pointer",
                                                        borderRadius:4, fontFamily:"inherit", textTransform:"uppercase",
                                                    }}>{l}</button>
                                                ))}
                                            </div>

                                            <div style={{ fontSize:13, color:"#4a8a4a", marginBottom:10 }}>
                                                Sweet spot: {(W/2).toFixed(2)}m × {(L*0.38).toFixed(2)}m × {(H*0.45).toFixed(2)}m &nbsp;·&nbsp; Schroeder: {Fs} Hz
                                            </div>

                                            <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:12 }}>
                                                {[{id:"A",lo:20,hi:80,col:"#ff8844"},{id:"B",lo:80,hi:200,col:"#ffcc44"},
                                                  {id:"C",lo:200,hi:1000,col:"#44aaff"},{id:"D",lo:1000,hi:4000,col:"#44ff88"}
                                                ].map(r => (
                                                    <div key={r.id} style={{ display:"flex", alignItems:"center", gap:6 }}>
                                                        <div style={{ width:11, height:11, background:r.col+"99", borderRadius:2 }} />
                                                        <span style={{ fontSize:13, color:"#5a9a5a" }}>{r.id} {r.lo}–{r.hi>=1000?r.hi/1000+"k":r.hi}Hz</span>
                                                    </div>
                                                ))}
                                            </div>

                                            <div style={{ height:240 }}>
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <LineChart data={eqData} margin={{ top:4, right:12, bottom:noteAxis?48:24, left:8 }}>
                                                        <ReferenceArea x1={20}   x2={80}   fill="#ff884420" fillOpacity={1} />
                                                        <ReferenceArea x1={80}   x2={200}  fill="#ffcc4420" fillOpacity={1} />
                                                        <ReferenceArea x1={200}  x2={1000} fill="#44aaff18" fillOpacity={1} />
                                                        <ReferenceArea x1={1000} x2={4000} fill="#44ff8818" fillOpacity={1} />
                                                        <ReferenceLine x={80}   stroke="#ffffff15" strokeDasharray="4 4" />
                                                        <ReferenceLine x={200}  stroke="#ffffff15" strokeDasharray="4 4" />
                                                        <ReferenceLine x={1000} stroke="#ffffff15" strokeDasharray="4 4" />
                                                        <ReferenceLine x={Fs}   stroke="#e8b04077" strokeDasharray="6 3" />
                                                        <CartesianGrid strokeDasharray="3 3" stroke="#0f1e0f" />
                                                        <XAxis dataKey="freq" type="number" scale="log"
                                                            domain={[20,4000]}
                                                            ticks={noteAxis ? noteTicks : hzTicks}
                                                            tickFormatter={v => noteAxis ? noteLabel(v) : v>=1000?(v/1000)+"k":v+""}
                                                            tick={{ fill:"#5a9a5a", fontSize:noteAxis?11:14 }}
                                                            angle={noteAxis?-50:0} textAnchor={noteAxis?"end":"middle"}
                                                            height={noteAxis?48:24} allowDataOverflow={false} />
                                                        <YAxis tick={{ fill:"#5a9a5a", fontSize:14 }} unit="dB" domain={[-24,24]} />
                                                        <Tooltip contentStyle={{ background:"#0b1a0b", border:"1px solid #3a7a3a", fontSize:14, color:"#c8eec8" }}
                                                            formatter={v => [`${v} dB`,"Livello"]}
                                                            labelFormatter={f => `${f} Hz · ${noteLabel(f)}`} />
                                                        <ReferenceLine y={0} stroke="#2a5a2a" strokeDasharray="4 4" />
                                                        <Line type="monotone" dataKey="dB" stroke="#3ae870" strokeWidth={2} dot={false} isAnimationActive={false} />
                                                    </LineChart>
                                                </ResponsiveContainer>
                                            </div>

                                            <Piano eqData={eqData} />
                                        </div>
                                    )}

                                    {/* TRATTAMENTO */}
                                    <TreatmentSection
                                        neededSA={neededSA} sa={sa} rtI={rtI} V={V} Fs={Fs}
                                    />
                                </>}
                            </div>
                        )}

                        {/* ══ MODI ══ */}
                        {tab === "modi" && (
                            <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                                {!ready && <Empty />}
                                {ready && (() => {
                                    const regs = [
                                        {id:"A",lo:20,  hi:80,  label:"Regione A — Modale Forte (20–80 Hz)",        color:"#ff8844"},
                                        {id:"B",lo:80,  hi:200, label:"Regione B — Modale/Transizione (80–200 Hz)", color:"#ffcc44"},
                                        {id:"C",lo:200, hi:500, label:"Regione C — Transizione (200–500 Hz)",       color:"#44aaff"},
                                    ];
                                    const filteredModes = modes.filter(m =>
                                        (mType==="all" || m.type===mType) && (mAxis==="all" || m.axis===mAxis)
                                    );
                                    return <>
                                        <div style={{ display:"flex", gap:12, marginBottom:6 }}>
                                            <select onChange={e => setMType(e.target.value)} style={sel}>
                                                <option value="all">Tutti i tipi</option>
                                                <option value="assiale">Assiali</option>
                                                <option value="tangenziale">Tangenziali</option>
                                                <option value="obliquo">Obliqui</option>
                                            </select>
                                            <select onChange={e => setMAxis(e.target.value)} style={sel}>
                                                <option value="all">Tutti gli assi</option>
                                                <option value="L">Asse L</option>
                                                <option value="W">Asse W</option>
                                                <option value="H">Asse H</option>
                                            </select>
                                        </div>
                                        <div style={{ fontSize:15, color:"#5a9a5a" }}>{filteredModes.length} modi · Schroeder: {Fs} Hz</div>
                                        <div style={{ display:"flex", gap:18, flexWrap:"wrap", marginBottom:6 }}>
                                            <LL color="#7ac87a" label="Assiale" />
                                            <LL color="#e8b040" label="Tangenziale" />
                                            <LL color="#5a9aaa" label="Obliquo" />
                                        </div>
                                        {regs.map(reg => {
                                            const rm = filteredModes.filter(m => m.freq>=reg.lo && m.freq<reg.hi);
                                            if (!rm.length) return null;
                                            return (
                                                <div key={reg.id}>
                                                    <div style={{ display:"flex", alignItems:"center", gap:10, margin:"14px 0 8px" }}>
                                                        <div style={{ width:4, height:20, background:reg.color, borderRadius:2, flexShrink:0 }} />
                                                        <span style={{ fontSize:16, color:reg.color, fontWeight:700 }}>{reg.label}</span>
                                                        <div style={{ flex:1, height:1, background:reg.color+"33" }} />
                                                        <span style={{ fontSize:13, color:reg.color+"bb", flexShrink:0 }}>{rm.length} modi</span>
                                                    </div>
                                                    {rm.map((m, i) => {
                                                        const col = m.type==="assiale"?"#7ac87a":m.type==="tangenziale"?"#e8b040":"#5a9aaa";
                                                        const bw  = m.type==="assiale"?"100%":m.type==="tangenziale"?"58%":"32%";
                                                        return (
                                                            <div key={i} style={{
                                                                display:"grid", gridTemplateColumns:"90px 100px 1fr 120px",
                                                                alignItems:"center", gap:12, padding:"8px 14px",
                                                                background:"#060d06", border:`1px solid ${col}33`,
                                                                borderLeft:`3px solid ${col}`, borderRadius:4, marginBottom:5,
                                                            }}>
                                                                <span style={{ fontSize:17, fontWeight:700, color:col }}>{m.freq}<span style={{ fontSize:13, color:"#3a6a3a" }}> Hz</span></span>
                                                                <span style={{ fontSize:13, color:"#4a8a4a" }}>({m.nx},{m.ny},{m.nz})</span>
                                                                <div style={{ background:"#0f1a0f", borderRadius:3, height:6 }}>
                                                                    <div style={{ width:bw, background:col+"99", height:"100%", borderRadius:3 }} />
                                                                </div>
                                                                <span style={{ fontSize:13, color:col, textAlign:"right", letterSpacing:1 }}>
                                                                    {noteLabel(m.freq)} · {m.type.slice(0,3).toUpperCase()}
                                                                </span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            );
                                        })}
                                        {filteredModes.filter(m => m.freq>=500).length>0 && (
                                            <div>
                                                <div style={{ display:"flex", alignItems:"center", gap:10, margin:"14px 0 8px" }}>
                                                    <div style={{ width:4, height:20, background:"#44ff88", borderRadius:2, flexShrink:0 }} />
                                                    <span style={{ fontSize:16, color:"#44cc70", fontWeight:700 }}>Regione D — Diffuso (&gt;500 Hz)</span>
                                                    <div style={{ flex:1, height:1, background:"#44cc7033" }} />
                                                </div>
                                                <div style={{ fontSize:15, color:"#3a7a3a", padding:"12px 16px",
                                                    background:"#060d06", border:"1px dashed #1a3a1a", borderRadius:5, lineHeight:1.8 }}>
                                                    Campo sonoro prevalentemente diffuso (Schroeder: {Fs} Hz).<br/>
                                                    Il trattamento geometrico è più efficace del calcolo modale.
                                                </div>
                                            </div>
                                        )}
                                    </>;
                                })()}
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
